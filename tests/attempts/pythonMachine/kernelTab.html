<!DOCTYPE html>
<!-- kernelElectionProbe의 독립 browsing context. 각 iframe이 자기 Web Lock 요청, BroadcastChannel,
     Python 커널 수명주기를 소유한다. 부모는 postMessage로만 명령한다. -->
<html lang="ko"><head><meta charset="utf-8"><title>persistent machine participant</title></head>
<body>
<script type="module">
  import { openPersistentMachine } from "../../../index.js";
  const parent = window.parent;
  const post = (message) => parent.postMessage({ from: "kernelTab", ...message }, "*");
  const indexParam = new URLSearchParams(location.search).get("indexURL");
  const INDEX = indexParam ? new URL(indexParam, location.href).href : undefined;
  let machine = null;
  let unsubscribe = null;

  window.addEventListener("message", async (event) => {
    const message = event.data;
    if (!message || message.to !== "kernelTab") return;
    try {
      if (message.cmd === "join") {
        const root = await navigator.storage.getDirectory();
        const journalDir = await root.getDirectoryHandle(message.journalName, { create: true });
        const assetIntegrity = await fetch("/pyproc-assets.json", { cache: "no-store" }).then((response) => response.json());
        machine = await openPersistentMachine({
          name: message.name,
          participantId: message.tabId,
          manifest: { indexURL: INDEX },
          journalDir,
          assetIntegrity,
          onStatus: (status) => post({ id: message.tabId, event: "status", status }),
        });
        unsubscribe = machine.subscribe((status) => post({ id: message.tabId, event: "status", status }));
        post({ id: message.tabId, reqId: message.reqId, ok: true, status: machine.status() });
      } else if (message.cmd === "run") {
        const result = await machine.run(message.code, { async: !!message.async, timeoutMs: message.timeoutMs });
        post({ id: message.tabId, reqId: message.reqId, ok: true, result, status: machine.status() });
      } else if (message.cmd === "commit") {
        const commit = await machine.commit({ timeoutMs: message.timeoutMs });
        post({ id: message.tabId, reqId: message.reqId, ok: true, commit, status: machine.status() });
      } else if (message.cmd === "status") {
        post({ id: message.tabId, reqId: message.reqId, ok: true, status: machine.status() });
      } else if (message.cmd === "leave") {
        if (unsubscribe) unsubscribe();
        machine.leave();
        post({ id: message.tabId, reqId: message.reqId, ok: true, status: machine.status() });
      }
    } catch (error) {
      post({
        id: message.tabId,
        reqId: message.reqId,
        ok: false,
        error: String(error.message || error).slice(-300),
        code: error.code || null,
        retryable: error.retryable === true,
        status: machine ? machine.status() : null,
      });
    }
  });
  post({ event: "ready" });
</script>
</body></html>
