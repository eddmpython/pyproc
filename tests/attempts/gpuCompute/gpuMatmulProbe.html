<!DOCTYPE html>
<!--
결과(append): Phase 2 개념 - WGSL 컴퓨트 matmul이 정확하고 WASM numpy보다 빠른가.
f32 A@B를 GPU 컴퓨트 셰이더로: SAB view writeBuffer 업로드 -> 타일드 matmul -> 리드백.
정확성(CPU 참조) + 속도(WASM numpy 대비 >= 10배). 어댑터 없으면 SKIP(헤드리스 = green).
실행: PYPROC_HEADED=1 node tests/browser/run.mjs tests/attempts/gpuCompute/gpuMatmulProbe.html
-->
<html lang="ko">
<head><meta charset="utf-8"><title>probe: gpu matmul</title>
<style>body{font:14px/1.5 system-ui;margin:2rem;max-width:52rem} pre{background:#f4f4f5;padding:1rem;border-radius:6px;white-space:pre-wrap}</style></head>
<body>
<h1>probe: WebGPU 컴퓨트 matmul (Phase 2 - f32 대규모 선형대수)</h1>
<pre id="out">실행 중...</pre>
<script type="module">
  import { PyProc } from "../../../index.js";
  const out = document.getElementById("out");
  const checks = []; const timings = {};
  const check = (name, pass, info = "") => { checks.push({ name, pass: !!pass, info: String(info) }); out.textContent += `\n${pass ? "PASS" : "FAIL"} ${name}${info ? " (" + info + ")" : ""}`; };
  const report = async () => {
    const ok = checks.length > 0 && checks.every((c) => c.pass);
    try { await fetch("/gateReport", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ok, checks, timings }) }); } catch (e) {}
  };
  const indexParam = new URLSearchParams(location.search).get("indexURL");
  const INDEX = indexParam ? new URL(indexParam, location.href).href : undefined;

  // 타일드 WGSL matmul(정확성 우선, 16x16 워크그룹). C[row,col] = sum_k A[row,k]*B[k,col].
  const WGSL = `
struct Dims { m: u32, k: u32, n: u32, pad: u32 };
@group(0) @binding(0) var<storage, read> a: array<f32>;
@group(0) @binding(1) var<storage, read> b: array<f32>;
@group(0) @binding(2) var<storage, read_write> c: array<f32>;
@group(0) @binding(3) var<uniform> d: Dims;
@compute @workgroup_size(16, 16)
fn main(@builtin(global_invocation_id) gid: vec3<u32>) {
  let row = gid.x; let col = gid.y;
  if (row >= d.m || col >= d.n) { return; }
  var sum = 0.0;
  for (var k = 0u; k < d.k; k = k + 1u) { sum = sum + a[row * d.k + k] * b[k * d.n + col]; }
  c[row * d.n + col] = sum;
}`;

  async function gpuMatmul(device, A, B, M, K, N) {
    const mkBuf = (arr, usage) => { const buf = device.createBuffer({ size: arr.byteLength, usage, mappedAtCreation: true }); new Float32Array(buf.getMappedRange()).set(arr); buf.unmap(); return buf; };
    const aBuf = mkBuf(A, GPUBufferUsage.STORAGE);
    const bBuf = mkBuf(B, GPUBufferUsage.STORAGE);
    const cBuf = device.createBuffer({ size: M * N * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC });
    const dims = new Uint32Array([M, K, N, 0]);
    const dBuf = device.createBuffer({ size: 16, usage: GPUBufferUsage.UNIFORM, mappedAtCreation: true }); new Uint32Array(dBuf.getMappedRange()).set(dims); dBuf.unmap();
    const module = device.createShaderModule({ code: WGSL });
    const pipeline = device.createComputePipeline({ layout: "auto", compute: { module, entryPoint: "main" } });
    const bind = device.createBindGroup({ layout: pipeline.getBindGroupLayout(0), entries: [
      { binding: 0, resource: { buffer: aBuf } }, { binding: 1, resource: { buffer: bBuf } },
      { binding: 2, resource: { buffer: cBuf } }, { binding: 3, resource: { buffer: dBuf } },
    ] });
    const readBuf = device.createBuffer({ size: M * N * 4, usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ });
    const enc = device.createCommandEncoder();
    const pass = enc.beginComputePass(); pass.setPipeline(pipeline); pass.setBindGroup(0, bind);
    pass.dispatchWorkgroups(Math.ceil(M / 16), Math.ceil(N / 16)); pass.end();
    enc.copyBufferToBuffer(cBuf, 0, readBuf, 0, M * N * 4);
    device.queue.submit([enc.finish()]);
    await readBuf.mapAsync(GPUMapMode.READ);
    const C = new Float32Array(readBuf.getMappedRange().slice(0));
    [aBuf, bBuf, cBuf, dBuf, readBuf].forEach((b) => b.destroy());
    return C;
  }

  try {
    if (!("gpu" in navigator)) { check("SKIP: WebGPU 미노출(navigator.gpu 없음)", true); await report(); throw new Error("__skip__"); }
    let adapter = await navigator.gpu.requestAdapter();
    if (!adapter) adapter = await navigator.gpu.requestAdapter({ forceFallbackAdapter: true });
    if (!adapter) { check("SKIP: WebGPU 어댑터 없음(헤드리스 = 실 GPU 머신에서 PYPROC_HEADED=1로)", true); await report(); throw new Error("__skip__"); }
    const device = await adapter.requestDevice();
    check("WebGPU 디바이스 확보(실 GPU)", !!device);

    // 1) 정확성: 작은 matmul GPU vs JS CPU 참조(f32 허용오차).
    const m = 64, k = 48, n = 40;
    const A0 = new Float32Array(m * k), B0 = new Float32Array(k * n);
    for (let i = 0; i < A0.length; i++) A0[i] = ((i * 7 + 3) % 29) / 29 - 0.4;
    for (let i = 0; i < B0.length; i++) B0[i] = ((i * 5 + 1) % 31) / 31 - 0.6;
    const G = await gpuMatmul(device, A0, B0, m, k, n);
    const ref = new Float32Array(m * n);
    for (let i = 0; i < m; i++) for (let j = 0; j < n; j++) { let s = 0; for (let x = 0; x < k; x++) s += A0[i * k + x] * B0[x * n + j]; ref[i * n + j] = s; }
    let maxErr = 0; for (let i = 0; i < ref.length; i++) maxErr = Math.max(maxErr, Math.abs(G[i] - ref[i]));
    check("정확성: GPU matmul == CPU 참조(f32 허용오차)", maxErr < 1e-3, `maxErr ${maxErr.toExponential(2)}`);

    // 2) 속도: 대형 f32 matmul GPU 종단(업로드+연산+리드백) vs WASM numpy(단일워커) 대비 >= 10배.
    const S = 1024;
    const AA = new Float32Array(S * S), BB = new Float32Array(S * S);
    for (let i = 0; i < AA.length; i++) { AA[i] = ((i * 3 + 1) % 17) / 17 - 0.5; BB[i] = ((i * 5 + 2) % 13) / 13 - 0.5; }
    await gpuMatmul(device, AA, BB, S, S, S); // 워밍업(셰이더 컴파일/파이프라인)
    let t = performance.now();
    const CC = await gpuMatmul(device, AA, BB, S, S, S);
    timings.gpuMs = +(performance.now() - t).toFixed(1);
    check("대형 GPU matmul 완주(결과 유한)", Number.isFinite(CC[0]) && Number.isFinite(CC[S * S - 1]), `${timings.gpuMs}ms`);

    // WASM numpy 단일워커 baseline(같은 크기, f64 = numpy 기본).
    const os = new PyProc({ indexURL: INDEX, packages: ["numpy"], setup: "import numpy" });
    await os.boot(1);
    const AAd = Float64Array.from(AA), BBd = Float64Array.from(BB);
    t = performance.now();
    await os.matmul({ data: AAd, rows: S, cols: S }, { data: BBd, rows: S, cols: S }, { parts: 1 });
    timings.numpyMs = Math.round(performance.now() - t);
    os.terminate();
    timings.gpuSpeedup = +(timings.numpyMs / timings.gpuMs).toFixed(1);
    check("GPU 종단 >= 10배 vs WASM numpy(단일워커)", timings.gpuSpeedup >= 10, `numpy ${timings.numpyMs}ms, GPU ${timings.gpuMs}ms, ${timings.gpuSpeedup}x`);
  } catch (e) {
    if (!String(e).includes("__skip__")) check("예외 없음", false, String(e).slice(-300));
  }
  await report();
</script>
</body>
</html>
