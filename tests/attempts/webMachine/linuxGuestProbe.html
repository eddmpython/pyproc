<!doctype html>
<!--
결과(2026-07-15, Edge headless, COOP+COEP): 3회 연속 GREEN 8/8.
Linux 6.8.12 i686 boot 3661/3662/3657ms, state 51,890,928-51,944,164 bytes,
snapshot 57-71ms, live restore 54-83ms, v86 destroy 뒤 cold restore 163-175ms.
판정: 외부 주입형 x86 adapter가 공통 lifecycle과 portable state 계약을 통과했다.
-->
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>Web Machine Linux guest probe</title>
  <style>body{font:14px/1.5 system-ui;margin:2rem;max-width:62rem}pre{background:#f4f4f5;padding:1rem;border-radius:8px;white-space:pre-wrap}</style>
</head>
<body>
<h1>Web Machine Linux guest probe</h1>
<p>외부 주입한 x86 엔진으로 Linux를 부팅하고 같은 host lifecycle에서 RAM state를 복원한다.</p>
<pre id="out">실행 중...</pre>
<script type="module">
  import { V86 } from "./assets/libv86.mjs";
  import { WebMachineHostDraft } from "./webMachineDraft.js";
  import { createV86GuestFactory } from "./v86GuestAdapterDraft.js";
  import { V86_ADAPTER_VERSION, createV86ProbeManifest } from "./v86ProbeConfig.js";

  const out = document.getElementById("out");
  const checks = [];
  const timings = {};
  const check = (name, pass, info = "") => {
    checks.push({ name, pass: !!pass, info: String(info) });
    out.textContent += `\n${pass ? "PASS" : "FAIL"} ${name}${info ? ` (${info})` : ""}`;
  };
  const report = async () => {
    const ok = checks.length > 0 && checks.every((entry) => entry.pass);
    try {
      await fetch("/gateReport", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ok, checks, timings }) });
    } catch (error) {}
  };

  const consoleLines = [];
  const host = new WebMachineHostDraft({
    devices: { console: { kind: "console", write: (line) => consoleLines.push(String(line)) } },
  });
  host.registerAdapter("x86-linux", createV86GuestFactory({ V86, adapterVersion: V86_ADAPTER_VERSION }));
  const machine = host.createMachine({
    machineId: "linuxOs",
    adapterId: "x86-linux",
    manifest: createV86ProbeManifest(),
    permissions: { devices: ["console"] },
  });

  try {
    let startedAt = performance.now();
    await machine.boot();
    timings.linuxBootMs = Math.round(performance.now() - startedAt);
    check("Buildroot Linux boot", machine.state === "running", `${timings.linuxBootMs}ms`);

    const kernel = await machine.request({ type: "serial", data: "uname -srm\n", waitFor: "~% " });
    check("Linux kernel command", /Linux\s+\S+\s+i[3-6]86/.test(kernel), kernel.trim().slice(-160));
    const initial = await machine.request({ type: "serial", data: "machine_value=42; echo WEB_MACHINE_VALUE:$machine_value\n", waitFor: "~% " });
    check("Linux guest state 설정", initial.includes("WEB_MACHINE_VALUE:42"), initial.trim().slice(-160));

    await machine.pause();
    startedAt = performance.now();
    const snapshot = await machine.snapshot();
    timings.linuxSnapshotMs = Math.round(performance.now() - startedAt);
    timings.linuxSnapshotBytes = snapshot.payload.byteLength;
    check("Linux state snapshot portable", snapshot.snapshotScope === "portable" && snapshot.payload.byteLength > 1024 * 1024, `${snapshot.payload.byteLength} bytes, ${timings.linuxSnapshotMs}ms`);

    await machine.resume();
    await machine.request({ type: "serial", data: "machine_value=99\n", waitFor: "~% " });
    await machine.pause();
    startedAt = performance.now();
    await machine.restore(snapshot);
    timings.linuxLiveRestoreMs = Math.round(performance.now() - startedAt);
    await machine.resume();
    const live = await machine.request({ type: "serial", data: "echo WEB_MACHINE_VALUE:$machine_value\n", waitFor: "~% " });
    check("Linux live restore RAM state", live.includes("WEB_MACHINE_VALUE:42"), `${timings.linuxLiveRestoreMs}ms`);

    await machine.pause();
    await machine.shutdown();
    startedAt = performance.now();
    await machine.restore(snapshot);
    timings.linuxColdRestoreMs = Math.round(performance.now() - startedAt);
    check("엔진 destroy 뒤 cold restore", machine.state === "paused", `${timings.linuxColdRestoreMs}ms`);
    await machine.resume();
    const cold = await machine.request({ type: "serial", data: "echo WEB_MACHINE_COLD:$machine_value\n", waitFor: "~% " });
    check("Linux cold restore RAM state", cold.includes("WEB_MACHINE_COLD:42"), cold.trim().slice(-160));

    const inspected = await machine.inspect();
    check("공통 lifecycle과 console device", inspected.history.some((entry) => entry.event === "restored") && consoleLines.some((line) => line.startsWith("x86:")), `${inspected.history.length} events, ${consoleLines.length} lines`);
    await machine.pause();
    await machine.shutdown();
  } catch (error) {
    check("예외 없음", false, String(error?.stack || error).slice(-1000));
    try { if (["running", "paused", "failed"].includes(machine.state)) await machine.shutdown(); } catch (cleanupError) {}
  }

  await report();
</script>
</body>
</html>
