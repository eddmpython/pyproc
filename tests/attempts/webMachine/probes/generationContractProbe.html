<!doctype html>
<!--
кІ°кіј (2026-07-15, Edge headless, COOP+COEP, 3нҡҢ): GREEN 16/16.
block write/flush, content-addressed manifest, torn commit, HEAD/PREV ліөкө¬мҷҖ
л©”лӘЁлҰ¬ л°Ҹ мӢӨм ң IndexedDB CAS raceм—җм„ң м •нҷ•нһҲ н•ң commitл§Ң м„ұкіөн–ҲлӢӨ. кё°мЎҙ generation лҚ®м–ҙм“°кё°лҠ” кұ°л¶Җн–ҲлӢӨ.
first commit 1-2ms, second commit 0ms, PREV recovery 1ms.
лӢӨмқҢ: pyproc homeкіј v86 diskк°Җ кіөнҶө block portлҘј мӢӨм ң м ҖмһҘмһҘм№ҳлЎң мҶҢл№„н•ҳкІҢ н•ңлӢӨ.
-->
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>Web Machine generation contract probe</title>
  <style>body{font:14px/1.5 system-ui;margin:2rem;max-width:62rem}pre{background:#f4f4f5;padding:1rem;border-radius:8px;white-space:pre-wrap}</style>
</head>
<body>
<h1>Web Machine generation contract probe</h1>
<p>guest snapshotкіј flushed block imageлҘј н•ң CAS generationмңјлЎң commitн•ҳкі  мҶҗмғҒлҗң HEADм—җм„ң PREVлЎң ліөкө¬н•ңлӢӨ.</p>
<pre id="out">мӢӨн–ү мӨ‘...</pre>
<script type="module">
  import { WebMachineHostDraft } from "../host/webMachineHostDraft.js";
  import { createFakeGuestFactory } from "../adapters/fakeGuestAdapter.js";
  import { MemoryBlockDevice } from "../browser/devices/memoryBlockDevice.js";
  import { MachineCommitCoordinator } from "../browser/persistence/machineCommitCoordinator.js";
  import { IndexedDbGenerationStore } from "../browser/persistence/indexedDbGenerationStore.js";
  import { MemoryGenerationStore } from "../browser/persistence/memoryGenerationStore.js";

  const out = document.getElementById("out");
  const checks = [];
  const timings = {};
  const check = (name, pass, info = "") => {
    checks.push({ name, pass: !!pass, info: String(info) });
    out.textContent += `\n${pass ? "PASS" : "FAIL"} ${name}${info ? ` (${info})` : ""}`;
  };
  const codeOf = async (promise) => {
    try { await promise; return ""; } catch (error) { return error?.code || String(error); }
  };
  const report = async () => {
    const ok = checks.length > 0 && checks.every((entry) => entry.pass);
    try {
      await fetch("/gateReport", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ok, checks, timings }) });
    } catch (error) {}
  };
  const delegateStore = (store, overrides = {}) => ({
    putBlob: overrides.putBlob || ((args) => store.putBlob(args)),
    getBlob: overrides.getBlob || ((digest) => store.getBlob(digest)),
    commitGeneration: overrides.commitGeneration || ((args) => store.commitGeneration(args)),
    readHead: overrides.readHead || ((groupId) => store.readHead(groupId)),
    readGeneration: overrides.readGeneration || ((groupId, generationId) => store.readGeneration(groupId, generationId)),
  });

  const consoleLines = [];
  const block = new MemoryBlockDevice({ byteLength: 64 });
  let instanceSequence = 0;
  const host = new WebMachineHostDraft({
    idFactory: () => `generation-${++instanceSequence}`,
    devices: {
      console: { kind: "console", write: (line) => consoleLines.push(String(line)) },
      block,
    },
  });
  host.registerAdapter("fakeStorage", createFakeGuestFactory({
    requiredDevices: [
      { name: "console", kind: "console" },
      { name: "block", kind: "block" },
    ],
  }));
  const machine = host.createMachine({
    machineId: "storageMachine",
    adapterId: "fakeStorage",
    manifest: { initialValue: 10 },
    permissions: { devices: ["console", "block"] },
  });
  const store = new MemoryGenerationStore();
  let generationSequence = 0;
  const coordinator = new MachineCommitCoordinator({
    store,
    cryptoProvider: crypto,
    idFactory: () => `g${++generationSequence}`,
    nowFactory: () => generationSequence,
  });
  const groupId = "generationContract";

  try {
    await machine.boot();
    await machine.request({ type: "increment", by: 2 });
    await machine.request({ type: "blockWrite", bytes: [1, 2, 3] });
    const liveBlock = await machine.request({ type: "blockRead", length: 3 });
    check("prototype block deviceк°Җ guest contextм—җ ліҙмЎҙ", liveBlock.join(",") === "1,2,3", liveBlock.join(","));
    check("writeмҷҖ flush кІҪкі„ л¶„лҰ¬", block.inspect().dirty === true && await codeOf(block.snapshot()) === "WEB_MACHINE_BLOCK_UNFLUSHED");
    const runningCode = await codeOf(coordinator.commitPaused({ groupId, machines: [machine], devices: { block }, expectedHead: null }));
    check("running machine commit м„ кұ°л¶Җ", runningCode === "WEB_MACHINE_COMMIT_STATE", runningCode);

    await machine.pause();
    let startedAt = performance.now();
    const first = await coordinator.commitPaused({ groupId, machines: [machine], devices: { block }, expectedHead: null });
    timings.firstCommitMs = Math.round(performance.now() - startedAt);
    check("мІ« generationмқҙ HEADлЎң мӣҗмһҗм Ғ publish", first.head.head === "g1" && first.head.prev === null, `${first.head.head}/${first.head.prev}`);
    check("block flush л’Ө snapshotмқҙ к°ҷмқҖ manifest", first.manifest.devices.length === 1 && block.inspect().dirty === false && block.inspect().flushes === 1);

    await machine.resume();
    await machine.request({ type: "increment", by: 100 });
    await machine.request({ type: "blockWrite", bytes: [9, 9, 9] });
    await machine.pause();
    startedAt = performance.now();
    const second = await coordinator.commitPaused({ groupId, machines: [machine], devices: { block }, expectedHead: "g1" });
    timings.secondCommitMs = Math.round(performance.now() - startedAt);
    check("л‘җ лІҲм§ё generationмқҙ PREVлҘј ліҙмЎҙ", second.head.head === "g2" && second.head.prev === "g1", `${second.head.head}/${second.head.prev}`);

    const tornStore = delegateStore(store, {
      commitGeneration: async () => { throw new Error("injected commit interruption"); },
    });
    const tornCoordinator = new MachineCommitCoordinator({
      store: tornStore,
      cryptoProvider: crypto,
      idFactory: () => "torn",
      nowFactory: () => 3,
    });
    const tornCode = await codeOf(tornCoordinator.commitPaused({ groupId, machines: [machine], devices: { block }, expectedHead: "g2" }));
    const headAfterTorn = await coordinator.readHead(groupId);
    check("torn commitмқҖ HEADлҘј л°”кҫём§Җ м•ҠмқҢ", !!tornCode && headAfterTorn.head === "g2" && headAfterTorn.prev === "g1", `${headAfterTorn.head}/${headAfterTorn.prev}`);

    const raceA = new MachineCommitCoordinator({ store, cryptoProvider: crypto, idFactory: () => "raceA", nowFactory: () => 4 });
    const raceB = new MachineCommitCoordinator({ store, cryptoProvider: crypto, idFactory: () => "raceB", nowFactory: () => 4 });
    const race = await Promise.allSettled([
      raceA.commitPaused({ groupId, machines: [machine], devices: { block }, expectedHead: "g2" }),
      raceB.commitPaused({ groupId, machines: [machine], devices: { block }, expectedHead: "g2" }),
    ]);
    const won = race.filter((entry) => entry.status === "fulfilled").length;
    const conflict = race.find((entry) => entry.status === "rejected")?.reason?.code;
    const raceHead = await coordinator.readHead(groupId);
    check("CAS raceлҠ” м •нҷ•нһҲ н•ң commitл§Ң мҠ№лҰ¬", won === 1 && conflict === "WEB_MACHINE_HEAD_CONFLICT", `won=${won}, conflict=${conflict}`);
    check("CAS мҠ№лҰ¬ generationмқҳ PREVлҠ” мқҙм „ HEAD", raceHead.prev === "g2", `${raceHead.head}/${raceHead.prev}`);
    const raceRecord = await store.readGeneration(groupId, raceHead.head);
    const duplicateCode = await codeOf(store.commitGeneration({
      groupId,
      generationId: raceHead.head,
      expectedHead: raceHead.head,
      record: raceRecord,
    }));
    const headAfterDuplicate = await coordinator.readHead(groupId);
    check("кё°мЎҙ memory generationмқҖ immutable", duplicateCode === "WEB_MACHINE_GENERATION_EXISTS" && headAfterDuplicate.head === raceHead.head && headAfterDuplicate.prev === "g2", duplicateCode);

    const corruptHeadStore = delegateStore(store, {
      readGeneration: async (requestedGroup, generationId) => {
        const record = await store.readGeneration(requestedGroup, generationId);
        return generationId === raceHead.head ? { ...record, manifestHash: "sha256:corrupt" } : record;
      },
    });
    const recoveryCoordinator = new MachineCommitCoordinator({
      store: corruptHeadStore,
      cryptoProvider: crypto,
      idFactory: () => "unused",
      nowFactory: () => 5,
    });
    await machine.shutdown();
    await block.write(0, new Uint8Array([7, 7, 7]));
    block.crash();
    startedAt = performance.now();
    const recovered = await recoveryCoordinator.restoreLatest({
      groupId,
      machines: { storageMachine: machine },
      devices: { block },
    });
    timings.prevRecoveryMs = Math.round(performance.now() - startedAt);
    check("мҶҗмғҒ HEADм—җм„ң PREV generation ліөкө¬", recovered.generationId === "g2" && recovered.recoveredFrom === raceHead.head, `${recovered.recoveredFrom}->${recovered.generationId}`);
    await machine.resume();
    const restoredValue = await machine.request({ type: "get" });
    const restoredBlock = await machine.request({ type: "blockRead", length: 3 });
    check("guest snapshotкіј blockмқҙ к°ҷмқҖ generation", restoredValue === 112 && restoredBlock.join(",") === "9,9,9", `${restoredValue}/${restoredBlock.join(",")}`);
    await machine.pause();

    const corruptBothStore = delegateStore(store, {
      readGeneration: async (requestedGroup, generationId) => {
        const record = await store.readGeneration(requestedGroup, generationId);
        return { ...record, manifestHash: "sha256:corrupt" };
      },
    });
    const unavailableCoordinator = new MachineCommitCoordinator({
      store: corruptBothStore,
      cryptoProvider: crypto,
      idFactory: () => "unused",
      nowFactory: () => 6,
    });
    const unavailableCode = await codeOf(unavailableCoordinator.restoreLatest({
      groupId,
      machines: { storageMachine: machine },
      devices: { block },
    }));
    check("HEADмҷҖ PREV лӘЁл‘җ мҶҗмғҒлҗҳл©ҙ лӘ…мӢңм Ғ мӢӨнҢЁ", unavailableCode === "WEB_MACHINE_RECOVERY_UNAVAILABLE", unavailableCode);
    check("content-addressed manifestк°Җ payload bytesлҘј м§Ғм ‘ нҸ¬н•Ён•ҳм§Җ м•ҠмқҢ", !JSON.stringify(second.manifest).includes("1,2,3") && second.manifest.machines[0].payload.digest.startsWith("sha256:"));

    const indexedStore = new IndexedDbGenerationStore({ indexedDb: indexedDB, databaseName: "webMachineGenerationContractV1" });
    const indexedRace = await Promise.allSettled([
      indexedStore.commitGeneration({ groupId: "indexedRace", generationId: "indexedA", expectedHead: null, record: { manifest: {}, manifestHash: "sha256:a" } }),
      indexedStore.commitGeneration({ groupId: "indexedRace", generationId: "indexedB", expectedHead: null, record: { manifest: {}, manifestHash: "sha256:b" } }),
    ]);
    const indexedWon = indexedRace.filter((entry) => entry.status === "fulfilled").length;
    const indexedConflict = indexedRace.find((entry) => entry.status === "rejected")?.reason?.code;
    const indexedHead = await indexedStore.readHead("indexedRace");
    check("IndexedDB transaction CASлҸ„ м •нҷ•нһҲ н•ң commit", indexedWon === 1 && indexedConflict === "WEB_MACHINE_HEAD_CONFLICT" && indexedHead?.prev === null, `${indexedHead?.head}, won=${indexedWon}`);
    const indexedRecord = await indexedStore.readGeneration("indexedRace", indexedHead.head);
    const indexedDuplicateCode = await codeOf(indexedStore.commitGeneration({
      groupId: "indexedRace",
      generationId: indexedHead.head,
      expectedHead: indexedHead.head,
      record: indexedRecord,
    }));
    const indexedHeadAfterDuplicate = await indexedStore.readHead("indexedRace");
    check("кё°мЎҙ IndexedDB generationмқҖ immutable", indexedDuplicateCode === "WEB_MACHINE_GENERATION_EXISTS" && indexedHeadAfterDuplicate.head === indexedHead.head && indexedHeadAfterDuplicate.prev === null, indexedDuplicateCode);
    indexedStore.close();
    await machine.shutdown();
  } catch (error) {
    check("мҳҲмҷё м—ҶмқҢ", false, String(error?.stack || error).slice(-1200));
    try { if (["running", "paused", "failed"].includes(machine.state)) await machine.shutdown(); } catch (cleanupError) {}
  }

  await report();
</script>
</body>
</html>
