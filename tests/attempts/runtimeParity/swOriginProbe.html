<!DOCTYPE html>
<html lang="ko">
<head><meta charset="utf-8"><title>probe: swOrigin</title>
<style>body{font:14px/1.5 system-ui;margin:2rem;max-width:52rem} pre{background:#f4f4f5;padding:1rem;border-radius:6px;white-space:pre-wrap}</style></head>
<body>
<h1>probe: к°ҖмғҒ мҳӨлҰ¬м§„ - нҢҢмқҙмҚ¬ м„ңлІ„к°Җ м§„м§ң URLлЎң мқ‘лӢөн•ңлӢӨ</h1>
<p>Service Workerк°Җ <code>/pyproc/*</code> fetchлҘј к°ҖлЎңмұ„ м»Өл„җмқҳ ASGIлЎң мң„мһ„н•ҳл©ҙ,
iframe/нғҖ мҠӨнҒ¬лҰҪнҠё/к·ёлғҘ fetch()к°Җ лёҢлқјмҡ°м Җ м•Ҳ нҢҢмқҙмҚ¬ м„ңлІ„лҘј HTTPмІҳлҹј л•ҢлҰ°лӢӨ(мҶҢмј“ 0).</p>
<pre id="out">мӢӨн–ү мӨ‘...</pre>
<script type="module">
  import { boot } from "../../../index.js";
  const out = document.getElementById("out");
  const checks = []; const timings = {};
  const check = (name, pass, info = "") => { checks.push({ name, pass: !!pass, info: String(info) }); out.textContent += `\n${pass ? "PASS" : "FAIL"} ${name}${info ? " (" + info + ")" : ""}`; };
  const report = async () => {
    const ok = checks.length > 0 && checks.every((c) => c.pass);
    try { await fetch("/gateReport", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ok, checks, timings }) }); } catch (e) {}
  };
  let reg = null;
  try {
    // 1) м»Өл„җ + ASGI м•ұ(н‘ңмӨҖ лқјмқҙлёҢлҹ¬лҰ¬л§Ң: м„Өм№ҳ 0 -> л°°м„  мһҗмІҙлҘј мёЎм •)
    let t = performance.now();
    const rt = await boot();
    timings.bootMs = Math.round(performance.now() - t);
    rt.run([
      "import json",
      "async def app(scope, receive, send):",
      "    msg = await receive()",
      "    body = msg.get('body', b'')",
      "    out = json.dumps({'path': scope['path'], 'method': scope['method'], 'q': scope['query_string'].decode(), 'echo': body.decode(), 'n': 42}).encode()",
      "    await send({'type': 'http.response.start', 'status': 200, 'headers': [(b'content-type', b'application/json')]})",
      "    await send({'type': 'http.response.body', 'body': out})",
    ].join("\n"));
    const asgi = rt.enableAsgiServer({ app: "app" });
    await asgi.install();

    // 2) SW л“ұлЎқ + нҺҳмқҙм§Җ мһҘм•… (claim)
    reg = await navigator.serviceWorker.register("./swOriginSw.js");
    await navigator.serviceWorker.ready;
    if (!navigator.serviceWorker.controller) {
      await new Promise((res) => navigator.serviceWorker.addEventListener("controllerchange", res, { once: true }));
    }
    check("SW л“ұлЎқ + нҺҳмқҙм§Җ мһҘм•…", !!navigator.serviceWorker.controller);

    // 3) SW -> м»Өл„җ л°°м„ : SWк°Җ л„ҳкёҙ мҡ”мІӯмқ„ ASGI dispatchлЎң мқ‘лӢө
    navigator.serviceWorker.addEventListener("message", async (e) => {
      const req = e.data && e.data.pyprocAsgi;
      if (!req) return;
      try {
        const r = await asgi.serve(req.method, req.path, req.body, req.query);
        e.ports[0].postMessage({ status: r.status, headers: r.headers, body: r.body });
      } catch (err) { e.ports[0].postMessage({ error: String(err).slice(-300) }); }
    });

    // 4) м§„м§ң fetchк°Җ нҢҢмқҙмҚ¬ м„ңлІ„м—җ лӢҝлҠ”к°Җ
    t = performance.now();
    const ping = await (await fetch("./pyproc/api/ping?x=1")).json();
    timings.firstFetchMs = Math.round(performance.now() - t);
    check("GET /pyproc/api/ping -> нҢҢмқҙмҚ¬ мқ‘лӢө", ping.n === 42 && ping.path === "/api/ping" && ping.q === "x=1",
      `${timings.firstFetchMs}ms, ${JSON.stringify(ping).slice(0, 70)}`);

    const echo = await (await fetch("./pyproc/api/echo", { method: "POST", body: '{"hi":1}' })).json();
    check("POST body мҷ•ліө", echo.method === "POST" && echo.echo === '{"hi":1}');

    const N = 20;
    t = performance.now();
    for (let i = 0; i < N; i++) await (await fetch("./pyproc/api/ping")).json();
    timings.avgFetchMs = +((performance.now() - t) / N).toFixed(1);
    check("нҸүк·  мҷ•ліө < 100ms", timings.avgFetchMs < 100, `${timings.avgFetchMs}ms/req x${N}`);

    const st = await fetch("./swOriginProbe.html");
    check("л¬ҙкҙҖ кІҪлЎңлҠ” м •м Ғ м„ңлІ„лЎң нҶөкіј", st.ok && (await st.text()).includes("swOrigin"));
  } catch (e) {
    check("мҳҲмҷё м—ҶмқҢ", false, String(e).slice(0, 300));
  }
  if (reg) await reg.unregister();
  await report();
</script>
</body>
</html>
