<!DOCTYPE html>
<html lang="ko">
<head><meta charset="utf-8"><title>probe: exceptionRestore</title>
<style>body{font:14px/1.5 system-ui;margin:2rem;max-width:52rem} pre{background:#f4f4f5;padding:1rem;border-radius:6px;white-space:pre-wrap}</style></head>
<body>
<h1>probe: 예외로 더러워진 힙의 안전 복원 (dartlab 흡수)</h1>
<pre id="out">실행 중...</pre>
<script type="module">
  import { boot } from "../../../index.js";
  const out = document.getElementById("out");
  const checks = []; const timings = {};
  const check = (name, pass, info = "") => { checks.push({ name, pass: !!pass, info: String(info) }); out.textContent += `\n${pass ? "PASS" : "FAIL"} ${name}${info ? " (" + info + ")" : ""}`; };
  const report = async () => {
    const ok = checks.length > 0 && checks.every((c) => c.pass);
    try { await fetch("/gateReport", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ok, checks, timings }) }); } catch (e) {}
  };
  try {
    const rt = await boot();
    const reactive = rt.enableReactive();
    const sp0 = reactive.stackSave();
    rt.run("x = 1");
    const cp = reactive.checkpoint();

    // 실행 중 예외: x는 999가 됐지만 checkpoint가 없다(경계 계약이 깨진 상태)
    try { rt.run("x = 999\nraise ValueError('boom')"); } catch (e) {}
    check("전제: 예외 후 힙은 더럽다(x==999)", rt.run("x") === 999);

    // 결함 재현: 저장 해시 신뢰 복원은 stale 비교라 오염을 못 본다
    reactive.restoreLive(cp.index, sp0);
    check("결함 재현: rehash 없는 restoreLive는 오염 잔존(x==999)", rt.run("x") === 999);

    // 흡수한 해법: 현재 힙 재해시 후 복원
    try { rt.run("x = 555\nraise ValueError('boom2')"); } catch (e) {}
    const t0 = performance.now();
    const r = reactive.restoreLive(cp.index, sp0, { rehash: true });
    timings.rehashRestoreMs = +(performance.now() - t0).toFixed(1);
    check("해법: restoreLive({rehash})가 x==1 복원", rt.run("x") === 1, `${timings.rehashRestoreMs}ms, ${r.pagesWritten}p`);

    // 복원 뒤 인터프리터 연속 실행(파이썬이 멀쩡한가)
    check("복원 후 연속 실행", rt.run("x + 41") === 42);
  } catch (e) {
    check("예외 없음", false, String(e).slice(0, 300));
  }
  await report();
</script>
</body>
</html>
