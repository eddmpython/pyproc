<!DOCTYPE html>
<html lang="ko">
<head><meta charset="utf-8"><title>probe: versionParity</title>
<style>body{font:14px/1.5 system-ui;margin:2rem;max-width:52rem} pre{background:#f4f4f5;padding:1rem;border-radius:6px;white-space:pre-wrap}</style></head>
<body>
<h1>probe: v314에서 dartlab 스택이 도는가 (이관 관문)</h1>
<pre id="out">실행 중...</pre>
<script type="module">
  import { boot } from "../../../index.js";
  const out = document.getElementById("out");
  const checks = []; const timings = {};
  const check = (name, pass, info = "") => { checks.push({ name, pass: !!pass, info: String(info) }); out.textContent += `\n${pass ? "PASS" : "FAIL"} ${name}${info ? " (" + info + ")" : ""}`; };
  const report = async () => {
    const ok = checks.length > 0 && checks.every((c) => c.pass);
    try { await fetch("/gateReport", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ok, checks, timings }) }); } catch (e) {}
  };
  try {
    const rt = await boot();
    // dartlab 실측 스택(0.27.5 기준)이 v314에서 설치·임포트되는지. 결과 자체가 데이터(능력 보고).
    for (const [pkg, mod] of [["fastapi", "fastapi"], ["pydantic", "pydantic"], ["polars", "polars"], ["numpy", "numpy"], ["requests", "requests"]]) {
      const t0 = performance.now();
      let info;
      try {
        await rt.install(pkg);
        const v = rt.run(`import ${mod}; getattr(${mod}, "__version__", "?")`);
        info = `ok ${v} (${Math.round(performance.now() - t0)}ms)`;
      } catch (e) {
        info = "실패: " + String(e).slice(0, 160);
      }
      check(`v314 설치·import: ${pkg}`, true, info);
      timings[pkg] = info;
    }
  } catch (e) {
    check("예외 없음", false, String(e).slice(0, 300));
  }
  await report();
</script>
</body>
</html>
