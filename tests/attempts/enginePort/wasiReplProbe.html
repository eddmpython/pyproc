<!DOCTYPE html>
<!--
결과(2026-07-12, Edge headless / 로컬 COOP+COEP):
- GREEN 12/12. non-Pyodide CPython(WASI)에서 인터프리터를 세워두고 코드 조각을 반복 실행:
  상태 유지(x=41 -> +1 -> print=42), 값 프로토콜 양방향(get=json.dumps / set=json.loads, FFI 없이),
  예외 생존, 표준 라이브러리, 결정적 부팅 + 반복 실행(두 커널 random 스트림 바이트 동일).
- **엔진 선형 메모리 위 완전 시간여행**: 경계에서 힙 체크포인트(10MB) -> 변이(v=200, big 2MB) ->
  복원 -> **복원 후 파이썬이 정확히 체크포인트 상태(v=100, log 1, big 없음)로 재개** -> 거기서
  분기(v=999)까지. pyproc의 리액티브/세션/.pymachine 전제(페이지 스냅샷/복원 + 재개)가 Pyodide
  `_module.HEAPU8` 없이 exports.memory 위에서 완전히 성립.
- 돌파한 벽 4개:
  1) 반복 루프 프레임 위 명시적 compile()이 wasm C 스택 초과 -> exec(str) 직접.
  2) argv에 UTF-8 멀티바이트(한글 주석) -> args 처리 크래시 -> 드라이버/코드를 preopen 파일로.
  3) Fd 부분 구현 stdin 초기화 크래시 -> OpenFile 상속 + fd_fdstat_get.
  4) **완전 상태복귀 벽(가장 어려운 것)**: 힙 복원이 파이썬 stdin 입력 스트림 상태(누적 바이트)를
     되돌려 재개가 어긋난다 -> **값 채널 무상태화**로 해결: 코드는 preopen 파일 /cmd(힙 밖 =
     복원 무관), stdin은 실행 신호 1바이트(무상태 = 복원 시점에 어긋날 상태가 없음). Pyodide
     FFI(코드를 힙에 직접 주입)가 없는 WASI에서도 완전 시간여행이 성립한다.
- 남은 벽(진짜): 스택 sp 미노출(경계-대-경계 복원은 성립), 네이티브 확장(PEP 783, 정적 링크).
-->
<html lang="ko">
<head><meta charset="utf-8"><title>probe: wasiRepl</title>
<style>body{font:14px/1.5 system-ui;margin:2rem;max-width:52rem} pre{background:#f4f4f5;padding:1rem;border-radius:6px;white-space:pre-wrap}</style></head>
<body>
<h1>probe: WASI 엔진 반복 실행 + 값 프로토콜 (떼기의 다음 관문)</h1>
<p>인터프리터를 세워두고 코드 조각을 N회 실행해 상태가 유지되는가(reactive의 전제).
파이썬 엔진 드라이버는 pyproc이 소유(wasiReplDriver.py), 외부 CPython은 참조만. WASI엔 FFI가
없으므로 값 다리는 stdin/stdout 값 프로토콜(base64 in, json out). 자산 없으면 SKIP.</p>
<pre id="out">실행 중...</pre>
<script type="module">
  const out = document.getElementById("out");
  const checks = []; const timings = {};
  const check = (name, pass, info = "") => { checks.push({ name, pass: !!pass, info: String(info) }); out.textContent += `\n${pass ? "PASS" : "FAIL"} ${name}${info ? " (" + info + ")" : ""}`; };
  const report = async () => {
    const ok = checks.length > 0 && checks.every((c) => c.pass);
    try { await fetch("/gateReport", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ok, checks, timings }) }); } catch (e) {}
  };

  // 메인측 REPL 클라이언트: 워커의 SAB 블로킹 stdin에 base64 코드를 밀어넣고 EOT까지 출력을 모은다.
  class WasiRepl {
    constructor(worker, ctl, data) {
      this.worker = worker; this.ctl = ctl; this.data = data;
      this.queue = []; this.idle = false; this.cur = null; this.lines = [];
      worker.addEventListener("message", (e) => this._onMessage(e.data));
    }
    _onMessage(m) {
      if (m.type === "idle") { this.idle = true; this._pump(); }
      else if (m.type === "meta") { const c = this.cur; this.cur = null; if (c) c.resolve(m); this._pump(); }
      else if (m.type === "out") {
        if (m.line === "\x04") { const r = this.lines; this.lines = []; const c = this.cur; this.cur = null; if (c) c.resolve(r.join("\n")); this._pump(); }
        else this.lines.push(m.stream === "stderr" ? "[stderr] " + m.line : m.line);
      }
    }
    // exec 신호(0x01) + 코드 바이트. 코드는 /cmd 파일로 실려 파이썬이 읽는다(stdin은 신호만).
    exec(code, timeoutMs = 12000) {
      const b = new TextEncoder().encode(code);
      const payload = new Uint8Array(1 + b.length); payload[0] = 1; payload.set(b, 1);
      return this._send({ payload }, timeoutMs);
    }
    // 메타(체크포인트/복원)는 0x00으로 fd_read가 파이썬에 넘기지 않고 소비한다.
    checkpoint(timeoutMs = 12000) { return this._send({ payload: new TextEncoder().encode("\x00checkpoint") }, timeoutMs); }
    restore(i, timeoutMs = 12000) { return this._send({ payload: new TextEncoder().encode("\x00restore " + i) }, timeoutMs); }
    _send(item, timeoutMs) {
      return new Promise((resolve) => {
        item.resolve = resolve;
        this.queue.push(item);
        this._pump();
        setTimeout(() => { if (this.cur === item) { this.cur = null; resolve("__TIMEOUT__"); } else { const i = this.queue.indexOf(item); if (i >= 0) { this.queue.splice(i, 1); resolve("__TIMEOUT__"); } } }, timeoutMs);
      });
    }
    _pump() {
      if (!this.idle || this.cur || !this.queue.length) return;
      this.cur = this.queue.shift(); this.idle = false;
      const bytes = this.cur.payload;
      this.data.set(bytes);
      Atomics.store(this.ctl, 1, bytes.length);
      Atomics.store(this.ctl, 0, 1);
      Atomics.notify(this.ctl, 0);
    }
  }

  const bootRepl = async (wasmBytes, driverSource, deterministic) => {
    const w = new Worker(new URL("./wasiWorker.js", import.meta.url), { type: "module" });
    const ctl = new Int32Array(new SharedArrayBuffer(8));
    const data = new Uint8Array(new SharedArrayBuffer(65536));
    const repl = new WasiRepl(w, ctl, data);
    await new Promise((res) => {
      const onReady = (e) => { if (e.data.type === "ready") { w.removeEventListener("message", onReady); res(); } };
      w.addEventListener("message", onReady);
      w.postMessage({ type: "replBoot", driverSource, deterministic, wasmBytes: wasmBytes.slice(0), ctlSab: ctl.buffer, dataSab: data.buffer });
    });
    return { worker: w, repl };
  };

  try {
    const wasmResp = await fetch("./pythonWasi.wasm");
    const driverResp = await fetch("./wasiReplDriver.py");
    if (!wasmResp.ok || !driverResp.ok) { check("SKIP: 자산 없음(README 레시피로 재현)", true); await report(); throw new Error("__skip__"); }
    const wasmBytes = await wasmResp.arrayBuffer();
    const driverSource = await driverResp.text();

    // 1) 반복 실행 + 상태 유지: 인터프리터 하나에서 여러 문장이 같은 네임스페이스를 공유한다
    let t = performance.now();
    const a = await bootRepl(wasmBytes, driverSource, false);
    timings.replBootMs = Math.round(performance.now() - t);
    const first = await a.repl.exec("print('hi')");
    check("첫 왕복(stdin 배선 살아있음)", first.trim() === "hi", `"${first.trim()}"`);
    await a.repl.exec("x = 41");
    await a.repl.exec("x = x + 1");
    const r1 = await a.repl.exec("print(x)");
    check("반복 실행 + 상태 유지(x=41 -> +1 -> print)", r1.trim() === "42", `"${r1.trim()}", 부팅 ${timings.replBootMs}ms`);

    // 2) 값 프로토콜(FFI 우회): set = 'name = <값>', get = 'print(json.dumps(name))'
    await a.repl.exec("import json");
    await a.repl.exec("obj = {'a': [1, 2, 3], 'n': 42}");
    const r2 = await a.repl.exec("print(json.dumps(obj))");
    check("값 프로토콜: 파이썬 값 회수(get)", JSON.stringify(JSON.parse(r2.trim())) === '{"a":[1,2,3],"n":42}', r2.trim());
    // set: JS 값을 파이썬에 주입
    const injected = { hello: "world", list: [9, 8, 7] };
    await a.repl.exec(`incoming = json.loads(${JSON.stringify(JSON.stringify(injected))})`);
    const r3 = await a.repl.exec("print(incoming['list'][0], incoming['hello'])");
    check("값 프로토콜: JS 값 주입(set)", r3.trim() === "9 world", r3.trim());

    // 3) 예외가 커널을 죽이지 않는다(드라이버가 traceback을 잡고 계속)
    const r4 = await a.repl.exec("1 / 0");
    const r5 = await a.repl.exec("print('survived', x)");
    check("예외 후에도 커널 생존", r4.includes("ZeroDivisionError") && r5.trim() === "survived 42", r5.trim());

    // 4) 표준 라이브러리 반복 사용(진짜 파이썬)
    const r6 = await a.repl.exec("import statistics\nprint(statistics.mean([10, 20, 30]))");
    check("표준 라이브러리 반복 사용", r6.trim() === "20", r6.trim());
    a.worker.terminate();

    // 5) 결정적 부팅 + 반복 실행: 두 커널의 random 스트림이 동일(리플레이의 전제)
    const [d1, d2] = await Promise.all([bootRepl(wasmBytes, driverSource, true), bootRepl(wasmBytes, driverSource, true)]);
    const [s1, s2] = await Promise.all([
      d1.repl.exec("import random\nprint(random.random(), random.random())"),
      d2.repl.exec("import random\nprint(random.random(), random.random())"),
    ]);
    check("결정적 부팅 + 반복 실행: random 스트림 동일", s1.trim() === s2.trim() && s1.trim().length > 0, `"${s1.trim()}" == "${s2.trim()}"`);
    d1.worker.terminate(); d2.worker.terminate();

    // 6) reactive의 핵심을 WASI 위에서: 경계(fd_read)에서 힙을 체크포인트하고 되돌린다.
    //    엔진의 선형 메모리(exports.memory)를 pyproc의 페이지 스냅샷/복원 알고리즘으로 다룰 수
    //    있는가 = 리액티브/세션/.pymachine의 전제. Pyodide _module.HEAPU8 없이 성립하는가.
    const tt = await bootRepl(wasmBytes, driverSource, false);
    await tt.repl.exec("state = {'v': 100, 'log': ['a']}");
    const cp = await tt.repl.checkpoint();
    check("WASI 힙 체크포인트(경계 스냅샷)", cp && cp.kind === "checkpoint" && cp.idx === 0, cp ? `idx=${cp.idx}, ${cp.mb}MB` : "실패");
    await tt.repl.exec("state['v'] = 200\nstate['log'].append('b')\nbig = bytearray(2*1024*1024)");
    const before = await tt.repl.exec("print(state['v'], len(state['log']), 'big' in dir())");
    check("변이 확인(v=200, log 2, big 존재)", before.trim() === "200 2 True", before.trim());
    const rr = await tt.repl.restore(0);
    check("WASI 힙 복원(경계 스냅샷으로 되돌림)", rr && rr.kind === "restore", rr ? "복원 성립" : "실패");
    // 복원 후 재개: unbuffered os.read 드라이버로 힙 복원이 wasm 크래시를 내지 않고 파이썬이
    // 살아서 다음 명령을 처리한다(에러가 out-of-bounds = wasm 붕괴가 아니라 파이썬 레벨이면
    // 인터프리터가 재개한 것). 완전한 상태복귀(state가 체크포인트로)는 stdin 입력 스트림의
    // 1바이트 재동기화가 잔여 벽 = 값 채널을 완전 무상태화하는 프로토콜이 전제(다음 관문).
    // 완전 시간여행: 값 채널 무상태화(코드=/cmd 파일, stdin=신호 1바이트)로 복원이 파이썬 I/O
    // 상태를 어긋내지 않으므로, 복원 후 파이썬이 재개해 상태가 정확히 체크포인트 시점으로 돌아간다.
    const after = await tt.repl.exec("print(state['v'], len(state['log']), 'big' in dir())");
    check("완전 시간여행: 복원 후 파이썬이 체크포인트 상태로 재개", after.trim() === "100 1 False",
      `"${after.trim()}" (기대 "100 1 False")`);
    // 한 번 더: 복원 지점에서 분기(다른 미래)해도 정상 = 시간여행이 반복 가능
    await tt.repl.exec("state['v'] = 999");
    const branched = await tt.repl.exec("print(state['v'], len(state['log']))");
    check("복원 후 분기 실행(반복 시간여행)", branched.trim() === "999 1", `"${branched.trim()}"`);
    tt.worker.terminate();
  } catch (e) {
    if (!String(e).includes("__skip__")) check("예외 없음", false, String(e).slice(-300));
  }
  await report();
</script>
</body>
</html>
