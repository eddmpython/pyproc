<!DOCTYPE html>
<!--
접지 실측(mainPlan 수치 성능 도약 PRD용): 이 환경(헤드리스 Edge, COOP+COEP)에서 수치 가속의
플랫폼 능력이 실제로 가용한가. report형(존재/부재를 사실로 기록, 부재도 정직한 데이터).
핵심 발견: 헤드리스 CI엔 GPU 어댑터가 없다(SwiftShader 미활성) = WebGPU 경로는 자동 게이트
불가, 실 GPU 머신 수동 검증 필요(소켓 릴레이와 같은 계급). WASM threads 전제(SAB)는 있다.
-->
<html lang="ko">
<head><meta charset="utf-8"><title>probe: gpu/simd cap</title></head>
<body>
<pre id="out">실행 중...</pre>
<script type="module">
  const out = document.getElementById("out");
  const checks = []; const timings = {};
  const check = (name, pass, info = "") => { checks.push({ name, pass: !!pass, info: String(info) }); out.textContent += `\n${pass ? "PASS" : "FAIL"} ${name}${info ? " (" + info + ")" : ""}`; };
  const report = async () => {
    const ok = checks.length > 0 && checks.every((c) => c.pass);
    try { await fetch("/gateReport", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ok, checks, timings }) }); } catch (e) {}
  };
  try {
    const report_ = (name, val, info = "") => check(name + " = " + val, true, info); // report형: 사실 기록, 항상 green
    report_("crossOriginIsolated", crossOriginIsolated === true);

    // 1) WebGPU 존재 + 어댑터/디바이스(부재도 사실로 기록)
    const hasGpu = typeof navigator !== "undefined" && "gpu" in navigator;
    report_("navigator.gpu 존재", hasGpu);
    let device = null;
    if (hasGpu) {
      try {
        const adapter = await navigator.gpu.requestAdapter();
        report_("WebGPU 어댑터 확보", !!adapter, adapter ? "" : "어댑터 null = 헤드리스 CI엔 GPU 없음(실 GPU 머신에서만)");
        if (adapter) { device = await adapter.requestDevice(); report_("WebGPU 디바이스 확보", !!device); }
      } catch (e) { report_("WebGPU 어댑터/디바이스", false, String(e).slice(0, 80)); }
    }

    // 2) 컴퓨트 셰이더 왕복: 1024개 원소 x2. GPU가 실제로 계산해 돌려주는가.
    if (device) {
      const N = 1024;
      const src = `
@group(0) @binding(0) var<storage, read_write> data: array<f32>;
@compute @workgroup_size(64)
fn main(@builtin(global_invocation_id) gid: vec3<u32>) {
  let i = gid.x;
  if (i < ${N}u) { data[i] = data[i] * 2.0; }
}`;
      const input = new Float32Array(N); for (let i = 0; i < N; i++) input[i] = i;
      const buf = device.createBuffer({ size: input.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC | GPUBufferUsage.COPY_DST });
      device.queue.writeBuffer(buf, 0, input);
      const module = device.createShaderModule({ code: src });
      const pipeline = device.createComputePipeline({ layout: "auto", compute: { module, entryPoint: "main" } });
      const bind = device.createBindGroup({ layout: pipeline.getBindGroupLayout(0), entries: [{ binding: 0, resource: { buffer: buf } }] });
      const t = performance.now();
      const enc = device.createCommandEncoder();
      const pass = enc.beginComputePass(); pass.setPipeline(pipeline); pass.setBindGroup(0, bind); pass.dispatchWorkgroups(Math.ceil(N / 64)); pass.end();
      const readBuf = device.createBuffer({ size: input.byteLength, usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ });
      enc.copyBufferToBuffer(buf, 0, readBuf, 0, input.byteLength);
      device.queue.submit([enc.finish()]);
      await readBuf.mapAsync(GPUMapMode.READ);
      const result = new Float32Array(readBuf.getMappedRange().slice(0));
      timings.gpuRoundtripMs = +(performance.now() - t).toFixed(1);
      report_("WebGPU 컴퓨트 왕복 x2 검산 정확", result[10] === 20 && result[1000] === 2000, `${timings.gpuRoundtripMs}ms`);
    }

    // 3) WASM SIMD 지원(v128) - 표준 감지 모듈(i8x16.splat). wasm-feature-detect 관례.
    const simdBytes = new Uint8Array([0,97,115,109,1,0,0,0,1,5,1,96,0,1,123,3,2,1,0,10,10,1,8,0,65,0,253,15,253,98,11]);
    let simd = false; try { simd = WebAssembly.validate(simdBytes); } catch (e) {}
    report_("WASM SIMD(v128) 지원", simd);

    // 4) WASM threads 전제(SharedArrayBuffer + Atomics) - crossOriginIsolated에서 열림
    report_("WASM threads 전제(SAB+Atomics)", typeof SharedArrayBuffer === "function" && typeof Atomics === "object");
  } catch (e) {
    check("예외 없음", false, String(e).slice(-200));
  }
  await report();
</script>
</body>
</html>
