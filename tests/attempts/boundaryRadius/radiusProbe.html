<!DOCTYPE html>
<html lang="ko">
<head><meta charset="utf-8"><title>probe: boundaryRadius</title>
<style>body{font:14px/1.5 system-ui;margin:2rem;max-width:56rem} pre{background:#f4f4f5;padding:1rem;border-radius:6px;white-space:pre-wrap;word-break:break-all}</style></head>
<body>
<h1>probe: 경계의 동일성 반경</h1>
<p>같은 매니페스트로 부팅한 힙의 <b>content address</b>를 낸다. 이 페이지를 두 번 열면
   <b>탭 대 탭</b> 반경이 나오고(localStorage로 앞 기록을 만난다), 기록을 커밋해 CI가
   재계산하면 <b>기기 대 기기</b> 반경이 나온다. 경계 자체는 한 번도 전송하지 않는다.</p>
<pre id="out">실행 중...</pre>
<script type="module">
  import { boot } from "../../../index.js";
  import { captureVector, boundaryDigest, compareVectors, toChallengeRecord, verifyRecord, defaultManifest, canonicalJson } from "./boundaryChallenge.js";

  const out = document.getElementById("out");
  const checks = []; const timings = {};
  const check = (name, pass, info = "") => {
    checks.push({ name, pass: !!pass, info: String(info) });
    out.textContent += `\n${pass ? "PASS" : "FAIL"} ${name}${info ? " (" + info + ")" : ""}`;
  };
  const STORE_KEY = "boundaryRadius/priorRecord";

  try {
    const manifest = defaultManifest;

    // 같은 탭 안에서 두 번: 이건 이미 아는 축이지만, 장치 자체가 맞는지 확인하는 대조군이다.
    // 이 축이 0이 아니면 아래 모든 측정이 무의미하므로 먼저 본다.
    const first = await captureVector(boot, manifest);
    const second = await captureVector(boot, manifest);
    const sameTab = compareVectors(first.vector, second.vector);
    timings.sameTab = `${sameTab.diffPages}p / ${sameTab.comparedPages}p`;
    check("대조군: 같은 탭 두 번 부팅", true, `${timings.sameTab}, 길이 ${sameTab.lengthMatch ? "동일" : "다름"}`);

    const digest = await boundaryDigest(first);
    check("경계 content address 산출", digest.length === 64, digest);
    check("힙 규모", true, `${(first.heapBytes / 1048576).toFixed(1)}MB, ${first.pageCount}페이지, 벡터 ${(first.vector.byteLength / 1024).toFixed(1)}KB`);

    // 탭 대 탭: 앞선 탭이 남긴 기록을 만난다. 없으면 남기고 끝난다(1차 실행).
    const priorRaw = localStorage.getItem(STORE_KEY);
    if (!priorRaw) {
      localStorage.setItem(STORE_KEY, JSON.stringify(await toChallengeRecord(first)));
      check("탭 대 탭: 1차 기록 남김", true, "이 페이지를 새 탭에서 다시 열면 대조한다");
    } else {
      const prior = JSON.parse(priorRaw);
      const priorRecord = await verifyRecord(prior); // localStorage 기록도 재계산해서 믿는다
      check("탭 대 탭: 기록이 자기 자신과 맞음", priorRecord.intact, priorRecord.intact ? "재계산 일치" : "기록 파손");
      const lengthSame = prior.heapBytes === first.heapBytes && prior.pageCount === first.pageCount;
      check("탭 대 탭: 힙 길이", lengthSame, `앞 ${prior.heapBytes}B/${prior.pageCount}p, 지금 ${first.heapBytes}B/${first.pageCount}p`);
      const crossTab = compareVectors(priorRecord.vector, first.vector);
      timings.crossTab = `${crossTab.diffPages}p / ${crossTab.comparedPages}p`;
      // 판정이 아니라 보고다: 0이 나올지 모르는 것을 게이트로 만들지 않는다(규칙).
      check("탭 대 탭: 상이 페이지 보고", true, `${timings.crossTab}, idx ${JSON.stringify(crossTab.diffIndices.slice(0, 8))}`);
      check("탭 대 탭: 다이제스트 일치", true, priorRecord.intact && priorRecord.recomputed === digest
        ? "일치 = 경계 동일"
        : `불일치\n  앞(재계산): ${priorRecord.recomputed}\n  지금: ${digest}`);
      timings.crossTabIdentical = String(crossTab.identical && priorRecord.intact && priorRecord.recomputed === digest);
    }

    // 기기 대 기기: 커밋된 기록을 만난다. 이 파일은 다른 기기가 남긴 것이다.
    // CI 러너(ubuntu + Google Chrome)와 개발 기기(Windows + Edge)는 OS도 브라우저 빌드도 CPU도
    // 다르다. 그래서 이 대조가 기기 대 기기 반경이고, 두 번째 기기를 살 필요가 없다.
    let committed = null;
    try {
      const response = await fetch("./challengeRecord.json", { cache: "no-store" });
      if (response.ok) committed = await response.json();
    } catch (error) { /* 기록이 아직 없으면 아래에서 산출만 한다(최초 실행). */ }

    if (!committed) {
      check("기기 대 기기: 기록 없음", true, "산출만 한다. 커밋하면 다음 기기가 대조한다");
    } else {
      // 기록의 digest 필드를 믿지 않는다. 기록 자신의 내용으로 재계산해서 맞는지 본다.
      // 이게 없으면 벡터와 다이제스트가 서로 모순인 기록이 조용히 통과한다(음성 시험이 실증).
      const record = await verifyRecord(committed);
      check("기기 대 기기: 기록이 자기 자신과 맞음", record.intact,
        record.intact ? "재계산 일치" : `기록 파손\n  적힌 값: ${record.declared}\n  재계산: ${record.recomputed}`);

      // 매니페스트가 다르면 경계 비교 자체가 무의미하다.
      const manifestSame = canonicalJson(committed.manifest) === canonicalJson(manifest);
      check("기기 대 기기: 매니페스트 동일", manifestSame, manifestSame ? "같은 조건" : "조건이 달라 비교 불가");
      const lengthSame = committed.heapBytes === first.heapBytes && committed.pageCount === first.pageCount;
      check("기기 대 기기: 힙 길이", lengthSame, `기록 ${committed.heapBytes}B/${committed.pageCount}p, 지금 ${first.heapBytes}B/${first.pageCount}p`);
      const crossDevice = compareVectors(record.vector, first.vector);
      timings.crossDevice = `${crossDevice.diffPages}p / ${crossDevice.comparedPages}p`;
      timings.crossDeviceIdentical = String(crossDevice.identical && record.intact && record.recomputed === digest);
      timings.crossDeviceDiffIndices = JSON.stringify(crossDevice.diffIndices);
      // 판정이 아니라 보고다. 결과를 모르는 것을 게이트로 만들지 않는다(규칙 SSOT).
      // 0이면 반경이 기기를 넘고, 0이 아니면 그 인덱스가 2단계(발산 출처 특정)의 입력이다.
      check("기기 대 기기: 상이 페이지 보고", true, `${timings.crossDevice}, idx ${JSON.stringify(crossDevice.diffIndices.slice(0, 8))}`);
      // 적힌 값이 아니라 **재계산한 값**과 비교한다. 기록이 파손이면 여기서도 그 사실이 보인다.
      check("기기 대 기기: 다이제스트 대조", true, record.intact && record.recomputed === digest
        ? "일치 = 경계가 기기를 넘는다"
        : `불일치\n  기록(재계산): ${record.recomputed}\n  지금: ${digest}${record.intact ? "" : "\n  기록이 파손이라 비교 자체가 무의미하다"}`);
    }

    timings.record = JSON.stringify(await toChallengeRecord(first));
  } catch (error) {
    check("probe 실행", false, error && error.stack ? error.stack : String(error));
  }

  const ok = checks.length > 0 && checks.every((c) => c.pass);
  out.textContent += `\n\n${ok ? "GREEN" : "RED"} ${checks.filter((c) => c.pass).length}/${checks.length}`;
  try {
    await fetch("/gateReport", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ok, checks, timings }) });
  } catch (error) { /* 수동 실행(npm run serve)에는 하네스가 없다. 화면 보고로 충분하다. */ }
</script>
</body>
</html>
