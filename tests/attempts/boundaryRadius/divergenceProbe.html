<!DOCTYPE html>
<html lang="ko">
<head><meta charset="utf-8"><title>probe: divergence</title>
<style>body{font:14px/1.5 system-ui;margin:2rem;max-width:60rem} pre{background:#f4f4f5;padding:1rem;border-radius:6px;white-space:pre-wrap;word-break:break-all}</style></head>
<body>
<h1>probe: 상이 페이지에 무엇이 사는가</h1>
<p>브라우저를 넘으면 틀어지는 페이지(48~52, 60~61, 221+)의 <b>실제 바이트</b>를 뜬다.
   추측하지 않는다. 읽는다.</p>
<pre id="out">실행 중...</pre>
<script type="module">
  import { boot } from "../../../index.js";
  import { captureVector, defaultManifest } from "./boundaryChallenge.js";

  const out = document.getElementById("out");
  const checks = []; const timings = {};
  const check = (name, pass, info = "") => {
    checks.push({ name, pass: !!pass, info: String(info) });
    out.textContent += `\n${pass ? "PASS" : "FAIL"} ${name}${info ? " (" + info + ")" : ""}`;
  };

  // 페이지 안의 인쇄 가능 ASCII 런을 뽑는다. 문자열이면 눈에 보인다.
  const asciiRuns = (bytes, minLength = 6) => {
    const runs = []; let start = -1;
    for (let i = 0; i <= bytes.length; i++) {
      const c = bytes[i];
      const printable = i < bytes.length && c >= 0x20 && c < 0x7f;
      if (printable && start < 0) start = i;
      else if (!printable && start >= 0) {
        if (i - start >= minLength) runs.push({ at: start, text: String.fromCharCode(...bytes.subarray(start, i)) });
        start = -1;
      }
    }
    return runs;
  };

  try {
    const session = await boot({ env: { ...defaultManifest.env } });
    const mem = session.memory;
    const PROBE_PAGES = [48, 49, 50, 51, 52, 58, 60, 61, 221, 222, 240];

    check("부팅", true, `${(mem.byteLength() / 1048576).toFixed(1)}MB`);

    // 이 브라우저가 무엇인지도 함께 싣는다. 어느 실행의 덤프인지 알아야 대조가 된다.
    timings.userAgent = navigator.userAgent;
    timings.timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
    timings.hardwareConcurrency = String(navigator.hardwareConcurrency);
    timings.deviceMemory = String(navigator.deviceMemory);
    check("실행 환경", true, `${navigator.userAgent}\n     TZ=${timings.timeZone}, cores=${navigator.hardwareConcurrency}`);

    const dump = {};
    for (const page of PROBE_PAGES) {
      const bytes = mem.slicePage(page);
      let zero = 0;
      for (let i = 0; i < bytes.length; i++) if (bytes[i] === 0) zero++;
      const runs = asciiRuns(bytes);
      // 페이지 전체를 나르면 아티팩트가 커진다. 문자열과 앞머리 hex만 싣는다.
      dump[page] = {
        zeroRatio: (zero / bytes.length).toFixed(3),
        runs: runs.slice(0, 12).map((r) => `@${r.at} ${JSON.stringify(r.text.slice(0, 90))}`),
        head: [...bytes.subarray(0, 64)].map((b) => b.toString(16).padStart(2, "0")).join(""),
      };
      check(`page ${page}`, true, `zero ${dump[page].zeroRatio}, 문자열 ${runs.length}개\n     ${dump[page].runs.slice(0, 4).join("\n     ")}`);
    }
    timings.dump = JSON.stringify(dump);
  } catch (error) {
    check("probe 실행", false, error && error.stack ? error.stack : String(error));
  }

  const ok = checks.length > 0 && checks.every((c) => c.pass);
  out.textContent += `\n\n${ok ? "GREEN" : "RED"} ${checks.filter((c) => c.pass).length}/${checks.length}`;
  try {
    await fetch("/gateReport", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ok, checks, timings }) });
  } catch (error) { /* 수동 실행에는 하네스가 없다. */ }
</script>
</body>
</html>
