<!doctype html>
<!--
결과(2026-07-15, Edge headless, COOP+COEP): 3회 연속 GREEN 18/18.
Linux VGA/PS2 최초 I/O 354/349/344ms, generation commit 347/297/299ms,
새 Edge process cold restore 356/353/352ms, display/input 재연결 I/O 437/426/458ms.
판정: console과 분리된 text display와 keyboard input의 pause 차단·cold reattach 계약이 성립했다.
-->
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>Web Machine display input probe</title>
  <style>body{font:14px/1.5 system-ui;margin:2rem;max-width:62rem}pre{background:#f4f4f5;padding:1rem;border-radius:8px;white-space:pre-wrap}</style>
  <script>
    window.addEventListener("error", (event) => {
      fetch("/gateReport", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ok: false, checks: [{ name: "module 초기화", pass: false, info: event.message }] }) }).catch(() => {});
    });
    window.addEventListener("unhandledrejection", (event) => {
      fetch("/gateReport", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ok: false, checks: [{ name: "처리되지 않은 promise", pass: false, info: String(event.reason) }] }) }).catch(() => {});
    });
  </script>
</head>
<body>
<h1>Web Machine display input probe</h1>
<p>console과 분리된 VGA text display와 PS/2 keyboard input을 Linux에 연결하고 process cold restore 뒤 새 장치에 다시 붙인다.</p>
<pre id="out">실행 중...</pre>
<script type="importmap">
  {"imports":{"@web-machine/core":"/packages/core/index.js"}}
</script>
<script type="module">
  import { WebMachineHost } from "../../../../packages/core/index.js";
  import {
    IndexedDbMachineStore,
    MachineCommitCoordinator,
    MemoryScanCodeInputDevice,
    MemoryTextDisplayDevice,
  } from "../../../../packages/browser/index.js";
  import { createV86GuestFactory } from "../../../../packages/guest-v86/index.js";
  import { encodePs2Set1Text } from "../../fixtures/input/ps2Set1Text.js";
  import { V86 } from "../../fixtures/v86/assets/libv86.mjs";
  import { V86_ADAPTER_VERSION, createV86ProbeManifest } from "../../fixtures/v86/config.js";

  const out = document.getElementById("out");
  const checks = [];
  const timings = {};
  const check = (name, pass, info = "") => {
    checks.push({ name, pass: !!pass, info: String(info) });
    out.textContent += `\n${pass ? "PASS" : "FAIL"} ${name}${info ? ` (${info})` : ""}`;
  };
  const codeOf = async (operation) => {
    try {
      await (typeof operation === "function" ? operation() : operation);
      return "";
    } catch (error) {
      return error?.code || String(error);
    }
  };
  const report = async () => {
    const ok = checks.length > 0 && checks.every((entry) => entry.pass);
    try {
      await fetch("/gateReport", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ok, checks, timings }) });
    } catch (error) {}
  };

  function displayText(display) {
    const frame = display.readFrame();
    const lines = [];
    for (let row = 0; row < frame.rows; row += 1) {
      const offset = row * frame.columns;
      lines.push(Array.from(frame.cells.subarray(offset, offset + frame.columns), (glyph) => String.fromCharCode(glyph || 32)).join(""));
    }
    return lines.join("\n");
  }

  async function waitForDisplay(display, pattern, timeoutMs = 10000) {
    const deadline = performance.now() + timeoutMs;
    while (performance.now() < deadline) {
      const text = displayText(display);
      if (text.includes(pattern)) return text;
      await new Promise((resolve) => setTimeout(resolve, 40));
    }
    throw new Error(`display marker timeout: ${pattern}\n${displayText(display).slice(-1200)}`);
  }

  async function verifyDeviceContracts() {
    const display = new MemoryTextDisplayDevice({ maxColumns: 4, maxRows: 2 });
    let presentedGlyph = 0;
    display.subscribe((frame) => { presentedGlyph = frame.cells[0]; });
    const displayPort = display.connect({ endpointId: "displayOwner" });
    const duplicateDisplayCode = await codeOf(() => display.connect({ endpointId: "displayOwner" }));
    const busyDisplayCode = await codeOf(() => display.connect({ endpointId: "otherOwner" }));
    displayPort.configure({ columns: 4, rows: 2 });
    displayPort.writeCell({ row: 0, column: 0, glyph: 65 });
    const beforePresent = display.readFrame();
    displayPort.present();
    const frame = display.readFrame();
    frame.cells[0] = 99;
    const rangeCode = await codeOf(() => displayPort.writeCell({ row: 2, column: 0, glyph: 65 }));
    const sizeCode = await codeOf(() => displayPort.configure({ columns: 5, rows: 2 }));
    displayPort.close();
    const closedDisplayCode = await codeOf(() => displayPort.present());
    check("display 단일 producer와 중복 연결 거부", duplicateDisplayCode === "WEB_MACHINE_DISPLAY_ENDPOINT_DUPLICATE" && busyDisplayCode === "WEB_MACHINE_DISPLAY_BUSY", `${duplicateDisplayCode}/${busyDisplayCode}`);
    check("display present 원자 복제", beforePresent.columns === 0 && presentedGlyph === 65 && display.readFrame().cells[0] === 65 && display.inspect().revision === 1, `${beforePresent.columns}/${presentedGlyph}/${display.inspect().revision}`);
    check("display size·cell·closed port 경계", rangeCode === "WEB_MACHINE_DISPLAY_RANGE" && sizeCode === "WEB_MACHINE_DISPLAY_SIZE" && closedDisplayCode === "WEB_MACHINE_DISPLAY_PORT_CLOSED", `${rangeCode}/${sizeCode}/${closedDisplayCode}`);

    const input = new MemoryScanCodeInputDevice({ maxBatchBytes: 4, maxQueuedBatches: 1 });
    let release;
    const blocked = new Promise((resolve) => { release = resolve; });
    let receivedCode = 0;
    const inputPort = input.connect({ endpointId: "inputOwner", receive: async (codes) => { receivedCode = codes[0]; await blocked; } });
    const duplicateInputCode = await codeOf(() => input.connect({ endpointId: "inputOwner", receive: () => {} }));
    const codes = Uint8Array.of(30);
    const firstInput = input.sendScanCodes(codes);
    codes[0] = 99;
    const queueCode = await codeOf(input.sendScanCodes(Uint8Array.of(31)));
    const batchCode = await codeOf(input.sendScanCodes(new Uint8Array(5)));
    release();
    await firstInput;
    inputPort.close();
    const unattachedCode = await codeOf(input.sendScanCodes(Uint8Array.of(32)));
    check("input 단일 focus와 bounded queue", duplicateInputCode === "WEB_MACHINE_INPUT_ENDPOINT_DUPLICATE" && queueCode === "WEB_MACHINE_INPUT_QUEUE_FULL", `${duplicateInputCode}/${queueCode}`);
    check("input bytes 격리·batch 상한·분리 거부", receivedCode === 30 && batchCode === "WEB_MACHINE_INPUT_BATCH_SIZE" && unattachedCode === "WEB_MACHINE_INPUT_UNATTACHED", `${receivedCode}/${batchCode}/${unattachedCode}`);
  }

  async function verifyCapabilityBoundary() {
    let engineConstructions = 0;
    function CountingV86() { engineConstructions += 1; }
    let sequence = 0;
    const goodDisplay = new MemoryTextDisplayDevice();
    const goodInput = new MemoryScanCodeInputDevice();
    const host = new WebMachineHost({
      idFactory: () => `boundary-${++sequence}`,
      devices: {
        console: { kind: "console", write: () => {} },
        wrongDisplay: { kind: "display", mode: "rgba-frame" },
        goodDisplay,
        input: goodInput,
      },
    });
    host.registerAdapter("wrong-display", createV86GuestFactory({ V86: CountingV86, displayDeviceName: "wrongDisplay" }));
    host.registerAdapter("denied-input", createV86GuestFactory({ V86: CountingV86, displayDeviceName: "goodDisplay", inputDeviceName: "input" }));
    const mismatch = host.createMachine({ machineId: "displayMismatch", adapterId: "wrong-display", permissions: { devices: ["console", "wrongDisplay"] } });
    const denied = host.createMachine({ machineId: "inputDenied", adapterId: "denied-input", permissions: { devices: ["console", "goodDisplay"] } });
    const modeCode = await codeOf(mismatch.boot());
    const permissionCode = await codeOf(denied.boot());
    check("display mode mismatch engine boot 전 거부", modeCode === "WEB_MACHINE_DEVICE_MODE_UNSUPPORTED", modeCode);
    check("input permission default deny와 engine boot 0", permissionCode === "WEB_MACHINE_DEVICE_PERMISSION_DENIED" && engineConstructions === 0, `${permissionCode}/${engineConstructions}`);
  }

  const params = new URLSearchParams(location.search);
  const restoring = params.get("restore") === "1";
  const display = new MemoryTextDisplayDevice();
  const input = new MemoryScanCodeInputDevice({ maxBatchBytes: 512 });
  const consoleLines = [];
  let instanceSequence = 0;
  const host = new WebMachineHost({
    idFactory: () => `${restoring ? "restore" : "commit"}-${++instanceSequence}`,
    devices: {
      console: { kind: "console", write: (line) => consoleLines.push(String(line)) },
      display,
      input,
    },
  });
  host.registerAdapter("x86-linux", createV86GuestFactory({
    V86,
    adapterVersion: `${V86_ADAPTER_VERSION}-display-input-v1`,
    displayDeviceName: "display",
    inputDeviceName: "input",
  }));
  const linux = host.createMachine({
    machineId: "linuxOs",
    adapterId: "x86-linux",
    manifest: createV86ProbeManifest(),
    permissions: { devices: ["console", "display", "input"] },
  });
  const store = new IndexedDbMachineStore({ indexedDb: indexedDB, databaseName: "webMachineDisplayInputV1" });
  const coordinator = new MachineCommitCoordinator({
    store,
    cryptoProvider: crypto,
    idFactory: () => "display-input-g1",
    nowFactory: () => 1,
  });
  const groupId = "displayInput";
  const ownerToken = await store.claimOwner({ groupId, ownerId: restoring ? "restore" : "initial" });
  linux.adoptOwnership(ownerToken);

  try {
    if (!restoring) {
      let startedAt = performance.now();
      await linux.boot();
      timings.initialBootMs = Math.round(performance.now() - startedAt);
      await waitForDisplay(display, "~% ");
      startedAt = performance.now();
      await input.sendScanCodes(encodePs2Set1Text("touch /tmp/first\necho displayfirst\n"));
      const firstDisplay = await waitForDisplay(display, "displayfirst");
      timings.initialKeyboardDisplayMs = Math.round(performance.now() - startedAt);
      const firstFile = await linux.request({ type: "serial", data: "test -f /tmp/first; echo FIRST_FILE_STATUS:$?\n", waitFor: "~% " });
      if (!firstFile.includes("FIRST_FILE_STATUS:0")) throw new Error(`PS/2 file command 실패: ${firstFile.slice(-500)}\n${firstDisplay.slice(-1000)}`);
      const beforePause = await linux.inspect();
      if (beforePause.guest?.display?.cellWrites < 1 || beforePause.guest?.input?.receivedCodes < 1) throw new Error(`display/input bridge I/O 없음: ${JSON.stringify(beforePause.guest)}`);
      await linux.pause();
      if (input.inspect().attached) throw new Error("paused input이 분리되지 않았다");
      startedAt = performance.now();
      await coordinator.commitPaused({ groupId, machines: [linux], expectedHead: null, ownerToken });
      timings.commitMs = Math.round(performance.now() - startedAt);
      await linux.shutdown();
      if (display.inspect().attached || input.inspect().attached) throw new Error("shutdown 뒤 display/input endpoint 잔존");
      store.close();
      await fetch("/gateRestart", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nextSearch: "?restore=1", timings }),
      });
      await new Promise(() => {});
    } else {
      await verifyDeviceContracts();
      await verifyCapabilityBoundary();
      let startedAt = performance.now();
      const restored = await coordinator.restoreLatest({ groupId, machines: { linuxOs: linux } });
      timings.processColdRestoreMs = Math.round(performance.now() - startedAt);
      check("새 process가 display/input handle 없이 machine 복원", restored.generationId === "display-input-g1" && restored.manifest.devices.length === 0, `${restored.generationId}/${restored.manifest.devices.length}`);
      check("paused cold restore는 display만 재연결", linux.state === "paused" && display.inspect().attached && !input.inspect().attached, `${linux.state}/${display.inspect().attached}/${input.inspect().attached}`);
      const pausedInputCode = await codeOf(input.sendScanCodes(encodePs2Set1Text("echo paused\n")));
      check("paused machine input 차단", pausedInputCode === "WEB_MACHINE_INPUT_UNATTACHED", pausedInputCode);
      const restoredScreen = await waitForDisplay(display, "displayfirst");
      check("VGA text frame이 새 display에 redraw", restoredScreen.includes("displayfirst") && display.inspect().revision > 0, `${display.inspect().columns}x${display.inspect().rows} r${display.inspect().revision}`);
      await linux.resume();
      check("resume 직전 새 input endpoint 재연결", input.inspect().attached, input.inspect().endpointId);
      startedAt = performance.now();
      await input.sendScanCodes(encodePs2Set1Text("touch /tmp/reopened\necho displayreopened\n"));
      const reopenedScreen = await waitForDisplay(display, "displayreopened");
      timings.reopenedKeyboardDisplayMs = Math.round(performance.now() - startedAt);
      const reopenedFile = await linux.request({ type: "serial", data: "test -f /tmp/reopened; echo REOPENED_FILE_STATUS:$?\n", waitFor: "~% " });
      check("PS/2 keyboard가 Linux command 실행", reopenedFile.includes("REOPENED_FILE_STATUS:0"), reopenedFile.trim().slice(-240));
      const inspected = await linux.inspect();
      check("VGA와 keyboard가 console 밖 별도 port 사용", inspected.guest?.display?.cellWrites > 0 && inspected.guest?.display?.errors === 0 && inspected.guest?.input?.receivedCodes > 0 && input.inspect().deliveryErrors === 0, JSON.stringify({ display: inspected.guest?.display, input: inspected.guest?.input }));
      check("새 process display frame에 keyboard 출력 존재", reopenedScreen.includes("displayreopened") && display.inspect().presentations > 0, `${display.inspect().presentations} frames`);
      check("새 host history는 boot 없이 restore", linux.history.some((entry) => entry.event === "restored") && !linux.history.some((entry) => entry.event === "booted"));
      await linux.pause();
      check("pause가 input endpoint 즉시 분리", !input.inspect().attached, input.inspect().attached);
      await linux.shutdown();
      check("shutdown이 display endpoint 분리", !display.inspect().attached && !input.inspect().attached, `${display.inspect().attached}/${input.inspect().attached}`);
      store.close();
      await report();
    }
  } catch (error) {
    check("예외 없음", false, String(error?.stack || error).slice(-1800));
    try { if (["running", "paused", "failed"].includes(linux.state)) await linux.shutdown(); } catch (cleanupError) {}
    store.close();
    await report();
  }
</script>
</body>
</html>
