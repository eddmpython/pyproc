<!doctype html>
<!--
결과(2026-07-15, Edge headless, COOP+COEP): 3회 연속 GREEN 27/27.
두 fake adapter 공통 lifecycle 4/5/4ms, device mode/permission boot 0회 차단,
ownership 상실 request 실행 1회·자동 replay 0회·late response 오염 0.
판정: Phase 1 contract 성립. 실제 두 엔진 probe로 진행.
-->
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>Web Machine host contract probe</title>
  <style>body{font:14px/1.5 system-ui;margin:2rem;max-width:62rem}pre{background:#f4f4f5;padding:1rem;border-radius:8px;white-space:pre-wrap}</style>
</head>
<body>
<h1>Web Machine host contract probe</h1>
<p>두 fake guest에 같은 lifecycle suite를 적용하고 paused snapshot, device permission/mode, portable/session scope, ownership fencing을 검증한다.</p>
<pre id="out">실행 중...</pre>
<script type="importmap">
  {"imports":{"@web-machine/core":"/src/machine/index.js"}}
</script>
<script type="module">
  import { WebMachineHost } from "../../../../src/machine/index.js";
  import { createFakeGuestFactory } from "../../contracts/fakeGuestAdapter.js";

  const out = document.getElementById("out");
  const checks = [];
  const timings = {};
  const check = (name, pass, info = "") => {
    checks.push({ name, pass: !!pass, info: String(info) });
    out.textContent += `\n${pass ? "PASS" : "FAIL"} ${name}${info ? ` (${info})` : ""}`;
  };
  const codeOf = async (promise) => {
    try { await promise; return ""; } catch (error) { return error?.code || String(error); }
  };
  const report = async () => {
    const ok = checks.length > 0 && checks.every((entry) => entry.pass);
    try {
      await fetch("/gateReport", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ok, checks, timings }) });
    } catch (error) {}
  };

  const consoleLines = [];
  let instanceSequence = 0;
  const host = new WebMachineHost({
    idFactory: () => `contract-${++instanceSequence}`,
    devices: {
      console: { kind: "console", write: (line) => consoleLines.push(String(line)) },
      network: { kind: "network", mode: "request" },
    },
  });
  const alphaMetrics = {};
  const betaMetrics = {};
  host.registerAdapter("fakeAlpha", createFakeGuestFactory({ adapterVersion: "alpha-v1", metrics: alphaMetrics }));
  host.registerAdapter("fakeBeta", createFakeGuestFactory({ adapterVersion: "beta-v1", metrics: betaMetrics }));

  async function runCommonLifecycle(adapterId, machineId) {
    const machine = host.createMachine({ machineId, adapterId, manifest: { initialValue: 10 }, permissions: { devices: ["console"] } });
    check(`${adapterId}: created`, machine.state === "created");
    await machine.boot();
    check(`${adapterId}: boot -> running`, machine.state === "running");
    const runningSnapshotCode = await codeOf(machine.snapshot());
    check(`${adapterId}: running snapshot 거부`, runningSnapshotCode === "WEB_MACHINE_INVALID_STATE", runningSnapshotCode);
    const value = await machine.request({ type: "increment", by: 2 });
    check(`${adapterId}: opaque request`, value === 12, value);
    await machine.pause();
    const blockedCode = await codeOf(machine.request({ type: "increment", by: 1 }));
    check(`${adapterId}: paused request 거부`, blockedCode === "WEB_MACHINE_INVALID_STATE", blockedCode);
    const snapshot = await machine.snapshot();
    check(`${adapterId}: portable opaque snapshot`, snapshot.snapshotScope === "portable" && snapshot.payload.byteLength > 0, `${snapshot.payload.byteLength} bytes`);
    await machine.resume();
    await machine.request({ type: "increment", by: 100 });
    await machine.pause();
    await machine.restore(snapshot);
    await machine.resume();
    const restored = await machine.request({ type: "get" });
    check(`${adapterId}: live restore`, restored === 12, restored);
    await machine.pause();
    await machine.shutdown();
    await machine.restore(snapshot);
    check(`${adapterId}: cold restore -> paused`, machine.state === "paused");
    await machine.resume();
    const cold = await machine.request({ type: "get" });
    check(`${adapterId}: cold restore 값`, cold === 12, cold);
    await machine.shutdown();
    return machine.history.map((entry) => entry.event);
  }

  try {
    const startedAt = performance.now();
    const alphaHistory = await runCommonLifecycle("fakeAlpha", "alphaMachine");
    const betaHistory = await runCommonLifecycle("fakeBeta", "betaMachine");
    timings.commonLifecycleMs = Math.round(performance.now() - startedAt);
    const requiredEvents = ["booted", "paused", "snapshotted", "restored", "resumed", "shutdown"];
    check("두 adapter가 같은 lifecycle event 계약", requiredEvents.every((event) => alphaHistory.includes(event) && betaHistory.includes(event)), `${alphaHistory.length}/${betaHistory.length} events`);

    const packetMetrics = {};
    host.registerAdapter("packetGuest", createFakeGuestFactory({
      requiredDevices: [{ name: "network", kind: "network", mode: "packet" }],
      metrics: packetMetrics,
    }));
    const packetMachine = host.createMachine({ machineId: "packetMachine", adapterId: "packetGuest", permissions: { devices: ["network"] } });
    const modeCode = await codeOf(packetMachine.boot());
    check("network request/packet mode mismatch 선거부", modeCode === "WEB_MACHINE_DEVICE_MODE_UNSUPPORTED" && packetMetrics.boots === 0, `${modeCode}, boots=${packetMetrics.boots || 0}`);

    const deniedMetrics = {};
    host.registerAdapter("deniedGuest", createFakeGuestFactory({ metrics: deniedMetrics }));
    const deniedMachine = host.createMachine({ machineId: "deniedMachine", adapterId: "deniedGuest", permissions: { devices: [] } });
    const deniedCode = await codeOf(deniedMachine.boot());
    check("device permission default deny", deniedCode === "WEB_MACHINE_DEVICE_PERMISSION_DENIED" && deniedMetrics.boots === 0, `${deniedCode}, boots=${deniedMetrics.boots || 0}`);

    const sessionMetrics = {};
    host.registerAdapter("sessionGuest", createFakeGuestFactory({ snapshotScope: "session", metrics: sessionMetrics }));
    const sessionMachine = host.createMachine({ machineId: "sessionMachine", adapterId: "sessionGuest", permissions: { devices: ["console"] } });
    await sessionMachine.boot();
    await sessionMachine.pause();
    const sessionSnapshot = await sessionMachine.snapshot();
    await sessionMachine.shutdown();
    const scopeCode = await codeOf(sessionMachine.restore(sessionSnapshot));
    check("session snapshot cold restore 거부", scopeCode === "WEB_MACHINE_SNAPSHOT_SCOPE", scopeCode);

    const mismatchMetrics = {};
    host.registerAdapter("mismatchGuest", createFakeGuestFactory({ metrics: mismatchMetrics }));
    const mismatchMachine = host.createMachine({ machineId: "mismatchMachine", adapterId: "mismatchGuest", permissions: { devices: ["console"] } });
    await mismatchMachine.boot();
    await mismatchMachine.pause();
    const goodSnapshot = await mismatchMachine.snapshot();
    const mismatchCode = await codeOf(mismatchMachine.restore({ ...goodSnapshot, adapterId: "fakeAlpha" }));
    check("adapter snapshot mismatch 거부", mismatchCode === "WEB_MACHINE_SNAPSHOT_INCOMPATIBLE", mismatchCode);
    await mismatchMachine.shutdown();

    const fencingMetrics = {};
    host.registerAdapter("fencingGuest", createFakeGuestFactory({ metrics: fencingMetrics }));
    const fencingMachine = host.createMachine({ machineId: "fencingMachine", adapterId: "fencingGuest", permissions: { devices: ["console"] } });
    await fencingMachine.boot();
    let release;
    let markStarted;
    const wait = new Promise((resolve) => { release = resolve; });
    const started = new Promise((resolve) => { markStarted = resolve; });
    const pending = fencingMachine.request({ type: "slowIncrement", by: 1, wait, started: markStarted });
    await started;
    fencingMachine.invalidateOwnership("probe leader removed");
    release();
    const unknownCode = await codeOf(pending);
    check("ownership 상실은 outcome unknown", unknownCode === "WEB_MACHINE_OUTCOME_UNKNOWN", unknownCode);
    check("outcome unknown 자동 replay 0", fencingMetrics.executions === 1, `executions=${fencingMetrics.executions}`);
    const nextValue = await fencingMachine.request({ type: "get" });
    check("늦은 응답이 다음 request를 오염시키지 않음", nextValue === 1, nextValue);
    await fencingMachine.shutdown();

    const cancelMetrics = {};
    host.registerAdapter("cancelGuest", createFakeGuestFactory({ metrics: cancelMetrics }));
    const cancelMachine = host.createMachine({ machineId: "cancelMachine", adapterId: "cancelGuest", permissions: { devices: ["console"] } });
    await cancelMachine.boot();
    let releaseCancel;
    let markCancelStarted;
    const cancelWait = new Promise((resolve) => { releaseCancel = resolve; });
    const cancelStarted = new Promise((resolve) => { markCancelStarted = resolve; });
    const runningController = new AbortController();
    const runningRequest = cancelMachine.request(
      { type: "slowIncrement", by: 1, wait: cancelWait, started: markCancelStarted },
      { signal: runningController.signal },
    );
    await cancelStarted;
    const runningAbortAt = performance.now();
    runningController.abort(new DOMException("probe abort", "AbortError"));
    const runningAbortCode = await codeOf(runningRequest);
    const runningAbortMs = performance.now() - runningAbortAt;
    check("실행 시작 뒤 request 취소는 즉시 outcome unknown", runningAbortCode === "WEB_MACHINE_OUTCOME_UNKNOWN" && runningAbortMs < 250, `${runningAbortCode}/${Math.round(runningAbortMs)}ms`);

    const queuedController = new AbortController();
    const queuedRequest = cancelMachine.request({ type: "increment", by: 100 }, { signal: queuedController.signal });
    const queuedAbortAt = performance.now();
    queuedController.abort(new DOMException("probe queued abort", "AbortError"));
    const queuedAbortCode = await codeOf(queuedRequest);
    const queuedAbortMs = performance.now() - queuedAbortAt;
    check("queue 대기 중 request 취소는 실행 없이 즉시 종료", queuedAbortCode === "WEB_MACHINE_OPERATION_ABORTED" && queuedAbortMs < 250, `${queuedAbortCode}/${Math.round(queuedAbortMs)}ms`);
    releaseCancel();
    const afterCancelValue = await cancelMachine.request({ type: "get" });
    check("취소된 queue 작업은 실행되지 않고 queue가 정상 drain", afterCancelValue === 1 && cancelMetrics.executions === 1, `${afterCancelValue}/${cancelMetrics.executions}`);
    await cancelMachine.shutdown();

    check("console device capability 연결", consoleLines.some((line) => line.includes("alphaMachine")) && consoleLines.some((line) => line.includes("betaMachine")), `${consoleLines.length} lines`);
  } catch (error) {
    check("예외 없음", false, String(error?.stack || error).slice(-600));
  }

  await report();
</script>
</body>
</html>
