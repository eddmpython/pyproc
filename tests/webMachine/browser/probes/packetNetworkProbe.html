<!doctype html>
<!--
결과(2026-07-15, Edge headless, COOP+COEP): 3회 연속 GREEN 14/14.
Linux eth0 최초 ARP/ICMP round trip 160/185/167ms, generation commit 412/329/332ms,
새 Edge process cold restore 452/380/357ms, 새 packet port 재연결 뒤 ping 137/117/129ms.
판정: request와 packet network를 분리하고 browser process보다 오래 사는 NIC 재연결 계약이 성립했다.
-->
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>Web Machine packet network probe</title>
  <style>body{font:14px/1.5 system-ui;margin:2rem;max-width:62rem}pre{background:#f4f4f5;padding:1rem;border-radius:8px;white-space:pre-wrap}</style>
  <script>
    window.addEventListener("error", (event) => {
      fetch("/gateReport", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ok: false, checks: [{ name: "module 초기화", pass: false, info: event.message }] }) }).catch(() => {});
    });
    window.addEventListener("unhandledrejection", (event) => {
      fetch("/gateReport", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ok: false, checks: [{ name: "처리되지 않은 promise", pass: false, info: String(event.reason) }] }) }).catch(() => {});
    });
  </script>
</head>
<body>
<h1>Web Machine packet network probe</h1>
<p>실제 Linux NIC를 bounded packet switch에 연결하고 ARP와 ICMP frame을 process cold restore 전후에 왕복한다.</p>
<pre id="out">실행 중...</pre>
<script type="importmap">
  {"imports":{"@web-machine/core":"/src/machine/index.js"}}
</script>
<script type="module">
  import { WebMachineHost, createMachineCryptoProvider } from "../../../../src/machine/index.js";
  import { IndexedDbMachineStore, MachineCommitCoordinator, MemoryEthernetSwitch } from "../../../../src/machine/index.js";
  import { createV86GuestFactory } from "../../../../src/machine/index.js";
  import { createIpv4EchoPeer } from "../../fixtures/network/ipv4EchoPeer.js";
  import { V86 } from "../../fixtures/v86/assets/libv86.mjs";
  import { V86_ADAPTER_VERSION, createV86ProbeManifest } from "../../fixtures/v86/config.js";

  const out = document.getElementById("out");
  const checks = [];
  const timings = {};
  const check = (name, pass, info = "") => {
    checks.push({ name, pass: !!pass, info: String(info) });
    out.textContent += `\n${pass ? "PASS" : "FAIL"} ${name}${info ? ` (${info})` : ""}`;
  };
  const codeOf = async (operation) => {
    try {
      await (typeof operation === "function" ? operation() : operation);
      return "";
    } catch (error) {
      return error?.code || String(error);
    }
  };
  const report = async () => {
    const ok = checks.length > 0 && checks.every((entry) => entry.pass);
    try {
      await fetch("/gateReport", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ok, checks, timings }) });
    } catch (error) {}
  };

  function testFrame() {
    const frame = new Uint8Array(60);
    frame.fill(0xff, 0, 6);
    frame.set([0x02, 0, 0, 0, 0, 2], 6);
    frame[12] = 0x08;
    frame[13] = 0;
    frame[20] = 42;
    return frame;
  }

  async function verifyPacketDeviceContract() {
    const network = new MemoryEthernetSwitch({ maxFrameBytes: 64, maxQueuedFrames: 1 });
    let release;
    const blocked = new Promise((resolve) => { release = resolve; });
    let receivedByte = -1;
    const receiver = network.connect({
      endpointId: "receiver",
      receive: async (frame) => {
        receivedByte = frame[20];
        await blocked;
      },
    });
    const sender = network.connect({ endpointId: "sender", receive: () => {} });
    const duplicateCode = await codeOf(() => network.connect({ endpointId: "receiver", receive: () => {} }));
    const frame = testFrame();
    const firstDelivery = sender.send(frame);
    frame[20] = 99;
    const queueCode = await codeOf(sender.send(frame));
    const sizeCode = await codeOf(sender.send(new Uint8Array(65)));
    release();
    await firstDelivery;
    sender.close();
    const closedCode = await codeOf(sender.send(testFrame()));
    receiver.close();
    check("packet endpoint 중복 거부", duplicateCode === "WEB_MACHINE_NETWORK_ENDPOINT_DUPLICATE", duplicateCode);
    check("bounded queue 포화 명시", queueCode === "WEB_MACHINE_PACKET_QUEUE_FULL", queueCode);
    check("frame 상한 강제", sizeCode === "WEB_MACHINE_PACKET_TOO_LARGE", sizeCode);
    check("송신 bytes 격리와 닫힌 port 거부", receivedByte === 42 && closedCode === "WEB_MACHINE_NETWORK_PORT_CLOSED", `${receivedByte}/${closedCode}`);
  }

  async function verifyCapabilityBoundary() {
    let engineConstructions = 0;
    function CountingV86() { engineConstructions += 1; }
    let sequence = 0;
    const requestNetwork = { kind: "network", mode: "request" };
    const host = new WebMachineHost({
      idFactory: () => `boundary-${++sequence}`,
      devices: { console: { kind: "console", write: () => {} }, network: requestNetwork },
    });
    host.registerAdapter("packet-linux", createV86GuestFactory({ V86: CountingV86, packetDeviceName: "network" }));
    const mismatch = host.createMachine({
      machineId: "modeMismatch",
      adapterId: "packet-linux",
      permissions: { devices: ["console", "network"] },
    });
    const denied = host.createMachine({
      machineId: "permissionDenied",
      adapterId: "packet-linux",
      permissions: { devices: ["console"] },
    });
    const modeCode = await codeOf(mismatch.boot());
    const permissionCode = await codeOf(denied.boot());
    check("request와 packet mode 선거부", modeCode === "WEB_MACHINE_DEVICE_MODE_UNSUPPORTED", modeCode);
    check("packet permission default deny와 engine boot 0", permissionCode === "WEB_MACHINE_DEVICE_PERMISSION_DENIED" && engineConstructions === 0, `${permissionCode}/${engineConstructions}`);
  }

  const params = new URLSearchParams(location.search);
  const restoring = params.get("restore") === "1";
  const network = new MemoryEthernetSwitch({ maxFrameBytes: 1518, maxQueuedFrames: 64 });
  const peer = createIpv4EchoPeer({ network, endpointId: "echoPeer" });
  const consoleLines = [];
  let instanceSequence = 0;
  const host = new WebMachineHost({
    idFactory: () => `${restoring ? "restore" : "commit"}-${++instanceSequence}`,
    devices: {
      console: { kind: "console", write: (line) => consoleLines.push(String(line)) },
      packetNetwork: network,
    },
  });
  host.registerAdapter("x86-linux", createV86GuestFactory({
    V86,
    adapterVersion: `${V86_ADAPTER_VERSION}-packet-v1`,
    packetDeviceName: "packetNetwork",
  }));
  const linux = host.createMachine({
    machineId: "linuxOs",
    adapterId: "x86-linux",
    manifest: createV86ProbeManifest(),
    permissions: { devices: ["console", "packetNetwork"] },
  });
  const store = new IndexedDbMachineStore({ indexedDb: indexedDB, databaseName: "webMachinePacketNetworkV1" });
  const coordinator = new MachineCommitCoordinator({
    store,
    cryptoProvider: createMachineCryptoProvider(crypto),
    idFactory: () => "packet-g1",
    nowFactory: () => 1,
  });
  const groupId = "packetNetwork";
  const ownerToken = await store.claimOwner({ groupId, ownerId: restoring ? "restore" : "initial" });
  linux.adoptOwnership(ownerToken);

  try {
    if (!restoring) {
      let startedAt = performance.now();
      await linux.boot();
      timings.initialBootMs = Math.round(performance.now() - startedAt);
      startedAt = performance.now();
      const initial = await linux.request({
        type: "serial",
        data: "ifconfig eth0 10.77.0.2 netmask 255.255.255.0 up; ping -c 1 -W 3 10.77.0.1; packet_status=$?; echo PACKET_INITIAL_STATUS:$packet_status\n",
        waitFor: "~% ",
        timeoutMs: 30000,
      });
      timings.initialRoundTripMs = Math.round(performance.now() - startedAt);
      const peerBeforeCommit = peer.inspect();
      if (!initial.includes("PACKET_INITIAL_STATUS:0") || peerBeforeCommit.arpRequests < 1 || peerBeforeCommit.echoRequests < 1) {
        throw new Error(`초기 packet round trip 실패: ${initial.trim().slice(-500)} / ${JSON.stringify(peerBeforeCommit)}`);
      }
      timings.initialArpRequests = peerBeforeCommit.arpRequests;
      timings.initialEchoRequests = peerBeforeCommit.echoRequests;
      await linux.pause();
      startedAt = performance.now();
      const committed = await coordinator.commitPaused({ groupId, machines: [linux], expectedHead: null, ownerToken });
      timings.commitMs = Math.round(performance.now() - startedAt);
      await linux.shutdown();
      peer.close();
      store.close();
      await fetch("/gateRestart", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nextSearch: `?restore=1&commit=${committed.commitAddress}`, timings }),
      });
      await new Promise(() => {});
    } else {
      await verifyPacketDeviceContract();
      await verifyCapabilityBoundary();
      let startedAt = performance.now();
      const restored = await coordinator.restoreLatest({ groupId, machines: { linuxOs: linux } });
      timings.processColdRestoreMs = Math.round(performance.now() - startedAt);
      check("새 process가 NIC handle 없이 machine generation 복원", restored.generationId === new URLSearchParams(location.search).get("commit") && restored.devices.length === 0, `${restored.generationId.slice(0, 18)}../${restored.devices.length}`);
      check("cold restore가 새 packet port 연결", network.inspect().endpoints === 2 && linux.state === "paused", `${network.inspect().endpoints}/${linux.state}`);
      await linux.resume();
      startedAt = performance.now();
      const reopened = await linux.request({
        type: "serial",
        data: "ping -c 1 -W 3 10.77.0.1; packet_status=$?; echo PACKET_REOPEN_STATUS:$packet_status\n",
        waitFor: "~% ",
        timeoutMs: 30000,
      });
      timings.reopenedRoundTripMs = Math.round(performance.now() - startedAt);
      const peerAfterRestore = peer.inspect();
      const machineInspect = await linux.inspect();
      const networkInspect = network.inspect();
      check("Linux eth0 ICMP packet process cold round trip", reopened.includes("PACKET_REOPEN_STATUS:0") && peerAfterRestore.echoRequests >= 1, reopened.trim().slice(-240));
      check("v86 NIC가 공통 packet port 양방향 사용", machineInspect.guest?.network?.sentFrames >= 1 && machineInspect.guest.network.receivedFrames >= 1 && machineInspect.guest.network.sendErrors === 0, JSON.stringify(machineInspect.guest?.network));
      check("switch가 MAC 학습하고 drop 없이 전달", networkInspect.learnedAddresses >= 2 && networkInspect.deliveredFrames >= 2 && networkInspect.droppedFrames === 0 && networkInspect.deliveryErrors === 0, JSON.stringify(networkInspect));
      check("새 host history는 boot 없이 restore", linux.history.some((entry) => entry.event === "restored") && !linux.history.some((entry) => entry.event === "booted"));
      await linux.pause();
      await linux.shutdown();
      check("adapter shutdown이 NIC endpoint 분리", network.inspect().endpoints === 1, network.inspect().endpoints);
      peer.close();
      check("network owner 종료 뒤 endpoint 0", network.inspect().endpoints === 0, network.inspect().endpoints);
      store.close();
      await report();
    }
  } catch (error) {
    check("예외 없음", false, String(error?.stack || error).slice(-1600));
    try { if (["running", "paused", "failed"].includes(linux.state)) await linux.shutdown(); } catch (cleanupError) {}
    peer.close();
    store.close();
    await report();
  }
</script>
</body>
</html>
