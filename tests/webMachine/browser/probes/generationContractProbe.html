<!doctype html>
<!--
결과 (2026-07-15, Edge headless, COOP+COEP, 3회): GREEN 16/16.
block write/flush, content-addressed manifest, torn commit, HEAD/PREV 복구와
메모리 및 실제 IndexedDB CAS race에서 정확히 한 commit만 성공했다. 기존 generation 덮어쓰기는 거부했다.
first commit 1-2ms, second commit 0ms, PREV recovery 1ms.
다음: pyproc home과 v86 disk가 공통 block port를 실제 저장장치로 소비하게 한다.
-->
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>Web Machine generation contract probe</title>
  <style>body{font:14px/1.5 system-ui;margin:2rem;max-width:62rem}pre{background:#f4f4f5;padding:1rem;border-radius:8px;white-space:pre-wrap}</style>
</head>
<body>
<h1>Web Machine generation contract probe</h1>
<p>guest snapshot과 flushed block image를 한 CAS generation으로 commit하고 손상된 HEAD에서 PREV로 복구한다.</p>
<pre id="out">실행 중...</pre>
<script type="importmap">
  {"imports":{"@web-machine/core":"/src/machine/index.js"}}
</script>
<script type="module">
  import { WebMachineHost } from "../../../../src/machine/index.js";
  import {
    IndexedDbMachineStore,
    MachineCommitCoordinator,
    MemoryBlockDevice,
    MemoryMachineStore,
  } from "../../../../src/machine/index.js";
  import { createFakeGuestFactory } from "../../contracts/fakeGuestAdapter.js";
  import { runMachineStoreContract } from "../../contracts/machineStoreContract.mjs";

  const out = document.getElementById("out");
  const checks = [];
  const timings = {};
  const check = (name, pass, info = "") => {
    checks.push({ name, pass: !!pass, info: String(info) });
    out.textContent += `\n${pass ? "PASS" : "FAIL"} ${name}${info ? ` (${info})` : ""}`;
  };
  const codeOf = async (promise) => {
    try { await promise; return ""; } catch (error) { return error?.code || String(error); }
  };
  const report = async () => {
    const ok = checks.length > 0 && checks.every((entry) => entry.pass);
    try {
      await fetch("/gateReport", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ok, checks, timings }) });
    } catch (error) {}
  };
  const delegateStore = (store, overrides = {}) => ({
    getBlob: overrides.getBlob || ((digest) => store.getBlob(digest)),
    commitGeneration: overrides.commitGeneration || ((args) => store.commitGeneration(args)),
    readHead: overrides.readHead || ((groupId) => store.readHead(groupId)),
    readGeneration: overrides.readGeneration || ((groupId, generationId) => store.readGeneration(groupId, generationId)),
    pruneRecoveryWindow: overrides.pruneRecoveryWindow || ((args) => store.pruneRecoveryWindow(args)),
    dryRunRecoveryWindow: overrides.dryRunRecoveryWindow || ((args) => store.dryRunRecoveryWindow(args)),
    inspectStorage: overrides.inspectStorage || (() => store.inspectStorage()),
  });

  const consoleLines = [];
  const block = new MemoryBlockDevice({ byteLength: 64 });
  let instanceSequence = 0;
  const host = new WebMachineHost({
    idFactory: () => `generation-${++instanceSequence}`,
    devices: {
      console: { kind: "console", write: (line) => consoleLines.push(String(line)) },
      block,
    },
  });
  host.registerAdapter("fakeStorage", createFakeGuestFactory({
    requiredDevices: [
      { name: "console", kind: "console" },
      { name: "block", kind: "block" },
    ],
  }));
  const machine = host.createMachine({
    machineId: "storageMachine",
    adapterId: "fakeStorage",
    manifest: { initialValue: 10 },
    permissions: { devices: ["console", "block"] },
  });
  const store = new MemoryMachineStore();
  let generationSequence = 0;
  const coordinator = new MachineCommitCoordinator({
    store,
    cryptoProvider: crypto,
    idFactory: () => `g${++generationSequence}`,
    nowFactory: () => generationSequence,
  });
  const groupId = "generationContract";
  const ownerToken = await store.claimOwner({ groupId, ownerId: "generation-owner" });
  machine.adoptOwnership(ownerToken);

  try {
    await machine.boot();
    await machine.request({ type: "increment", by: 2 });
    await machine.request({ type: "blockWrite", bytes: [1, 2, 3] });
    const liveBlock = await machine.request({ type: "blockRead", length: 3 });
    check("prototype block device가 guest context에 보존", liveBlock.join(",") === "1,2,3", liveBlock.join(","));
    check("write와 flush 경계 분리", block.inspect().dirty === true && await codeOf(block.snapshot()) === "WEB_MACHINE_BLOCK_UNFLUSHED");
    const runningCode = await codeOf(coordinator.commitPaused({ groupId, machines: [machine], devices: { block }, expectedHead: null, ownerToken }));
    check("running machine commit 선거부", runningCode === "WEB_MACHINE_COMMIT_STATE", runningCode);

    await machine.pause();
    let startedAt = performance.now();
    const first = await coordinator.commitPaused({ groupId, machines: [machine], devices: { block }, expectedHead: null, ownerToken });
    timings.firstCommitMs = Math.round(performance.now() - startedAt);
    check("첫 generation이 HEAD로 원자적 publish", first.head.head === "g1" && first.head.prev === null && first.head.ownerEpoch === ownerToken.epoch, `${first.head.head}/${first.head.prev}/${first.head.ownerEpoch}`);
    check("block flush 뒤 snapshot이 같은 manifest", first.manifest.devices.length === 1 && block.inspect().dirty === false && block.inspect().flushes === 1);

    await machine.resume();
    await machine.request({ type: "increment", by: 100 });
    await machine.request({ type: "blockWrite", bytes: [9, 9, 9] });
    await machine.pause();
    startedAt = performance.now();
    const second = await coordinator.commitPaused({ groupId, machines: [machine], devices: { block }, expectedHead: "g1", ownerToken });
    timings.secondCommitMs = Math.round(performance.now() - startedAt);
    check("두 번째 generation이 PREV를 보존", second.head.head === "g2" && second.head.prev === "g1", `${second.head.head}/${second.head.prev}`);

    const tornStore = delegateStore(store, {
      commitGeneration: async () => { throw new Error("injected commit interruption"); },
    });
    const tornCoordinator = new MachineCommitCoordinator({
      store: tornStore,
      cryptoProvider: crypto,
      idFactory: () => "torn",
      nowFactory: () => 3,
    });
    const tornCode = await codeOf(tornCoordinator.commitPaused({ groupId, machines: [machine], devices: { block }, expectedHead: "g2", ownerToken }));
    const headAfterTorn = await coordinator.readHead(groupId);
    check("torn commit은 HEAD를 바꾸지 않음", !!tornCode && headAfterTorn.head === "g2" && headAfterTorn.prev === "g1", `${headAfterTorn.head}/${headAfterTorn.prev}`);

    const raceA = new MachineCommitCoordinator({ store, cryptoProvider: crypto, idFactory: () => "raceA", nowFactory: () => 4 });
    const raceB = new MachineCommitCoordinator({ store, cryptoProvider: crypto, idFactory: () => "raceB", nowFactory: () => 4 });
    const race = await Promise.allSettled([
      raceA.commitPaused({ groupId, machines: [machine], devices: { block }, expectedHead: "g2", ownerToken }),
      raceB.commitPaused({ groupId, machines: [machine], devices: { block }, expectedHead: "g2", ownerToken }),
    ]);
    const won = race.filter((entry) => entry.status === "fulfilled").length;
    const conflict = race.find((entry) => entry.status === "rejected")?.reason?.code;
    const raceHead = await coordinator.readHead(groupId);
    check("CAS race는 정확히 한 commit만 승리", won === 1 && conflict === "WEB_MACHINE_HEAD_CONFLICT", `won=${won}, conflict=${conflict}`);
    check("CAS 승리 generation의 PREV는 이전 HEAD", raceHead.prev === "g2", `${raceHead.head}/${raceHead.prev}`);
    const raceRecord = await store.readGeneration(groupId, raceHead.head);
    const duplicateCode = await codeOf(store.commitGeneration({
      groupId,
      generationId: raceHead.head,
      expectedHead: raceHead.head,
      ownerToken,
      blobs: [{ digest: "duplicate-orphan", bytes: new Uint8Array([1]) }],
      record: raceRecord,
    }));
    const headAfterDuplicate = await coordinator.readHead(groupId);
    check("기존 memory generation은 immutable", duplicateCode === "WEB_MACHINE_GENERATION_EXISTS" && headAfterDuplicate.head === raceHead.head && headAfterDuplicate.prev === "g2", duplicateCode);
    check("duplicate transaction은 blob도 publish하지 않음", await codeOf(store.getBlob("duplicate-orphan")) === "WEB_MACHINE_BLOB_MISSING");

    const corruptHeadStore = delegateStore(store, {
      readGeneration: async (requestedGroup, generationId) => {
        const record = await store.readGeneration(requestedGroup, generationId);
        return generationId === raceHead.head ? { ...record, manifestHash: "sha256:corrupt" } : record;
      },
    });
    const recoveryCoordinator = new MachineCommitCoordinator({
      store: corruptHeadStore,
      cryptoProvider: crypto,
      idFactory: () => "unused",
      nowFactory: () => 5,
    });
    await machine.shutdown();
    await block.write(0, new Uint8Array([7, 7, 7]));
    block.crash();
    startedAt = performance.now();
    const recovered = await recoveryCoordinator.restoreLatest({
      groupId,
      machines: { storageMachine: machine },
      devices: { block },
    });
    timings.prevRecoveryMs = Math.round(performance.now() - startedAt);
    check("손상 HEAD에서 PREV generation 복구", recovered.generationId === "g2" && recovered.recoveredFrom === raceHead.head, `${recovered.recoveredFrom}->${recovered.generationId}`);
    await machine.resume();
    const restoredValue = await machine.request({ type: "get" });
    const restoredBlock = await machine.request({ type: "blockRead", length: 3 });
    check("guest snapshot과 block이 같은 generation", restoredValue === 112 && restoredBlock.join(",") === "9,9,9", `${restoredValue}/${restoredBlock.join(",")}`);
    await machine.pause();

    const corruptBothStore = delegateStore(store, {
      readGeneration: async (requestedGroup, generationId) => {
        const record = await store.readGeneration(requestedGroup, generationId);
        return { ...record, manifestHash: "sha256:corrupt" };
      },
    });
    const unavailableCoordinator = new MachineCommitCoordinator({
      store: corruptBothStore,
      cryptoProvider: crypto,
      idFactory: () => "unused",
      nowFactory: () => 6,
    });
    const unavailableCode = await codeOf(unavailableCoordinator.restoreLatest({
      groupId,
      machines: { storageMachine: machine },
      devices: { block },
    }));
    check("HEAD와 PREV 모두 손상되면 명시적 실패", unavailableCode === "WEB_MACHINE_RECOVERY_UNAVAILABLE", unavailableCode);
    check("content-addressed manifest가 payload bytes를 직접 포함하지 않음", !JSON.stringify(second.manifest).includes("1,2,3") && second.manifest.machines[0].payload.digest.startsWith("sha256:"));
    const blockedDatabaseName = "webMachineSchemaBlockedV1";
    const legacyConnection = await new Promise((resolve, reject) => {
      const request = indexedDB.open(blockedDatabaseName, 1);
      request.onupgradeneeded = () => {
        request.result.createObjectStore("blobs").put(new Uint8Array([7]).buffer, "legacy-digest");
        request.result.createObjectStore("generations").put({ manifest: {}, manifestHash: "sha256:legacy" }, "blockedGroup\u0000legacy-generation");
        request.result.createObjectStore("heads").put({ head: "legacy-generation", prev: null }, "blockedGroup");
      };
      request.onerror = () => reject(request.error);
      request.onsuccess = () => resolve(request.result);
    });
    const legacyHead = await new Promise((resolve, reject) => {
      const request = legacyConnection.transaction("heads", "readonly").objectStore("heads").get("blockedGroup");
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
    const blockedStore = new IndexedDbMachineStore({ indexedDb: indexedDB, databaseName: blockedDatabaseName });
    const blockedCode = await codeOf(Promise.race([
      blockedStore.readHead("blockedGroup"),
      new Promise((_, reject) => setTimeout(() => reject(Object.assign(new Error("schema blocked timeout"), { code: "PROBE_TIMEOUT" })), 3000)),
    ]));
    check("v1 connection의 schema upgrade 차단은 기존 data를 보존", blockedCode === "WEB_MACHINE_SCHEMA_UPGRADE_BLOCKED" && legacyHead?.head === "legacy-generation", `${blockedCode}/${legacyHead?.head}`);
    blockedStore.close();
    legacyConnection.close();
    await new Promise((resolve) => setTimeout(resolve, 200));
    const migratedStore = new IndexedDbMachineStore({ indexedDb: indexedDB, databaseName: blockedDatabaseName });
    const migratedHead = await Promise.race([
      migratedStore.readHead("blockedGroup"),
      new Promise((_, reject) => setTimeout(() => reject(new Error("schema migration reopen timeout")), 3000)),
    ]);
    const migratedOwner = await Promise.race([
      migratedStore.claimOwner({ groupId: "blockedGroup", ownerId: "migrated-owner" }),
      new Promise((_, reject) => setTimeout(() => reject(new Error("schema migration claim timeout")), 3000)),
    ]);
    check("v1 data migration은 HEAD를 보존하고 pre-fence epoch 0을 기록", migratedHead?.head === "legacy-generation" && migratedHead?.ownerEpoch === 0 && migratedOwner.epoch === 1 && (await migratedStore.getBlob("legacy-digest"))[0] === 7, `${migratedHead?.head}/${migratedHead?.ownerEpoch}/${migratedOwner.epoch}`);
    migratedStore.close();

    const legacyOwnerDatabaseName = "webMachineLegacyOwnerEpochV1";
    const legacyOwnerDatabase = await new Promise((resolve, reject) => {
      const request = indexedDB.open(legacyOwnerDatabaseName, 1);
      request.onupgradeneeded = () => request.result.createObjectStore("owners");
      request.onerror = () => reject(request.error);
      request.onsuccess = () => resolve(request.result);
    });
    await new Promise((resolve, reject) => {
      const transaction = legacyOwnerDatabase.transaction("owners", "readwrite");
      transaction.objectStore("owners").put({ ownerId: "legacy-owner", epoch: 7, active: false }, "legacyEpochGroup");
      transaction.oncomplete = () => resolve();
      transaction.onerror = () => reject(transaction.error);
    });
    legacyOwnerDatabase.close();
    const legacyEpochStore = new IndexedDbMachineStore({
      indexedDb: indexedDB,
      databaseName: "webMachineLegacyEpochMigrationV2",
      legacyOwnerDatabaseName,
    });
    const migratedEpochOwner = await Promise.race([
      legacyEpochStore.claimOwner({ groupId: "legacyEpochGroup", ownerId: "v2-owner" }),
      new Promise((_, reject) => setTimeout(() => reject(new Error("legacy epoch claim timeout")), 3000)),
    ]);
    check("legacy epoch 7 뒤 첫 v2 claim은 epoch 8 이상", migratedEpochOwner.epoch >= 8, migratedEpochOwner.epoch);
    legacyEpochStore.close();

    const indexedContractStore = new IndexedDbMachineStore({ indexedDb: indexedDB, databaseName: "webMachineSharedContractV2" });
    await runMachineStoreContract(indexedContractStore, { groupId: "indexedSharedContract" });
    check("memory와 IndexedDB MachineStore가 같은 behavior suite 통과", true);
    indexedContractStore.close();

    const indexedStore = new IndexedDbMachineStore({ indexedDb: indexedDB, databaseName: "webMachineGenerationContractV1" });
    const indexedOwner = await indexedStore.claimOwner({ groupId: "indexedRace", ownerId: "indexed-owner" });
    const indexedRace = await Promise.allSettled([
      indexedStore.commitGeneration({ groupId: "indexedRace", generationId: "indexedA", expectedHead: null, ownerToken: indexedOwner, blobs: [], record: { manifest: {}, manifestHash: "sha256:a" } }),
      indexedStore.commitGeneration({ groupId: "indexedRace", generationId: "indexedB", expectedHead: null, ownerToken: indexedOwner, blobs: [], record: { manifest: {}, manifestHash: "sha256:b" } }),
    ]);
    const indexedWon = indexedRace.filter((entry) => entry.status === "fulfilled").length;
    const indexedConflict = indexedRace.find((entry) => entry.status === "rejected")?.reason?.code;
    const indexedHead = await indexedStore.readHead("indexedRace");
    check("IndexedDB transaction CAS도 정확히 한 commit", indexedWon === 1 && indexedConflict === "WEB_MACHINE_HEAD_CONFLICT" && indexedHead?.prev === null, `${indexedHead?.head}, won=${indexedWon}`);
    const indexedRecord = await indexedStore.readGeneration("indexedRace", indexedHead.head);
    const indexedDuplicateCode = await codeOf(indexedStore.commitGeneration({
      groupId: "indexedRace",
      generationId: indexedHead.head,
      expectedHead: indexedHead.head,
      ownerToken: indexedOwner,
      blobs: [],
      record: indexedRecord,
    }));
    const indexedHeadAfterDuplicate = await indexedStore.readHead("indexedRace");
    check("기존 IndexedDB generation은 immutable", indexedDuplicateCode === "WEB_MACHINE_GENERATION_EXISTS" && indexedHeadAfterDuplicate.head === indexedHead.head && indexedHeadAfterDuplicate.prev === null, indexedDuplicateCode);
    const transactionAbort = new AbortController();
    const abortedCommit = indexedStore.commitGeneration({
      groupId: "indexedRace",
      generationId: "indexedAbort",
      expectedHead: indexedHead.head,
      ownerToken: indexedOwner,
      blobs: Array.from({ length: 2000 }, (_, index) => ({ digest: `abort-digest-${index}`, bytes: new Uint8Array([index & 0xff]) })),
      record: { manifest: {}, manifestHash: "sha256:abort" },
      control: { signal: transactionAbort.signal },
    });
    setTimeout(() => transactionAbort.abort(new DOMException("transaction abort probe", "AbortError")), 0);
    const transactionAbortCode = await codeOf(abortedCommit);
    const headAfterAbort = await indexedStore.readHead("indexedRace");
    check("IndexedDB commit abort는 blob·generation·HEAD를 함께 rollback", transactionAbortCode === "WEB_MACHINE_OPERATION_ABORTED" && headAfterAbort.head === indexedHead.head && await codeOf(indexedStore.readGeneration("indexedRace", "indexedAbort")) === "WEB_MACHINE_GENERATION_MISSING" && await codeOf(indexedStore.getBlob("abort-digest-0")) === "WEB_MACHINE_BLOB_MISSING", transactionAbortCode);
    indexedStore.close();

    const retentionGroup = "indexedRetention";
    const retentionStore = new IndexedDbMachineStore({ indexedDb: indexedDB, databaseName: "webMachineGenerationRetentionV2" });
    const retentionOwner = await retentionStore.claimOwner({ groupId: retentionGroup, ownerId: "retention-owner" });
    let retentionHead = null;
    for (let index = 1; index <= 20; index += 1) {
      const generationId = `r${index}`;
      const digest = `digest-${index}`;
      const record = {
        manifest: {
          schemaVersion: 1,
          groupId: retentionGroup,
          generationId,
          machines: [{ machineId: "retained", payload: { digest, byteLength: 1 } }],
          devices: [],
        },
        manifestHash: `sha256:${index}`,
      };
      const published = await retentionStore.commitGeneration({
        groupId: retentionGroup,
        generationId,
        expectedHead: retentionHead,
        ownerToken: retentionOwner,
        blobs: [{ digest, bytes: new Uint8Array([index]) }],
        record,
      });
      retentionHead = published.head;
    }
    const retentionReport = await retentionStore.pruneRecoveryWindow({ groupId: retentionGroup, ownerToken: retentionOwner });
    const retentionInspect = await retentionStore.inspectStorage();
    const retainedHead = await retentionStore.readHead(retentionGroup);
    check("IndexedDB 20 generation은 HEAD/PREV 두 개로 정리", retentionReport.deletedGenerations === 18 && retentionReport.deletedBlobs === 18 && retentionInspect.generations === 2 && retentionInspect.blobs === 2, JSON.stringify(retentionInspect));
    check("retention 뒤 HEAD/PREV payload 보존", retainedHead.head === "r20" && retainedHead.prev === "r19" && (await retentionStore.getBlob("digest-20"))[0] === 20 && (await retentionStore.getBlob("digest-19"))[0] === 19, `${retainedHead.head}/${retainedHead.prev}`);
    check("retention이 old generation과 blob 제거", await codeOf(retentionStore.readGeneration(retentionGroup, "r1")) === "WEB_MACHINE_GENERATION_MISSING" && await codeOf(retentionStore.getBlob("digest-1")) === "WEB_MACHINE_BLOB_MISSING");
    retentionStore.close();
    await machine.shutdown();
  } catch (error) {
    check("예외 없음", false, String(error?.stack || error).slice(-1200));
    try { if (["running", "paused", "failed"].includes(machine.state)) await machine.shutdown(); } catch (cleanupError) {}
  }

  await report();
</script>
</body>
</html>
