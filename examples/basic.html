<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>pyproc - 기본 런타임</title>
  <style>body{font:14px/1.5 system-ui;margin:2rem;max-width:52rem} pre{background:#f4f4f5;padding:1rem;border-radius:6px;white-space:pre-wrap}</style>
</head>
<body>
  <h1>pyproc - 기본 런타임</h1>
  <p>브라우저에서 파이썬을 실행한다. Chromium/Edge에서 crossOriginIsolated 서버로 열 것.</p>
  <pre id="out">부팅 중...</pre>
  <script type="module">
    import { boot } from "../index.js";
    const out = document.getElementById("out");
    const log = (m) => { out.textContent += "\n" + m; };
    // 예제 실행 게이트(?gate): 완주 여부를 하네스에 보고. 사람이 열면 no-op.
    const gateMode = new URLSearchParams(location.search).has("gate");
    const gateReport = (ok) => { if (!gateMode) return; fetch("/gateReport", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ok: !!ok, checks: [{ name: document.title, pass: !!ok, info: out.textContent.slice(-180) }] }) }).catch(() => {}); };
    try {
      out.textContent = "부팅 중...";
      const rt = await boot();
      log("부팅 완료");
      const s = rt.run("sum(range(100))");
      log("sum(range(100)) = " + s);
      await rt.loadPackages(["numpy"]);
      const n = rt.run("import numpy as np; int(np.arange(10).sum())");
      log("numpy arange(10).sum() = " + n);
      gateReport(s === 4950 && n === 45);
    } catch (e) {
      log("오류: " + e);
      gateReport(false);
    }
  </script>
</body>
</html>
