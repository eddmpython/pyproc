# GitHub Pages 데모 배포. 빌드 없음(네이티브 ESM): 저장소 파일을 그대로 조립해 올린다.
# GH Pages는 응답 헤더를 못 달지만 실측으로 경로를 확보했다(pythonMachine 캠페인):
#   - SAB 없는 데모(machine/terminal/basic)는 헤더 없이 그대로 돈다(noCoiProbe 7/7).
#   - SAB 필요한 processOs는 pyprocSw(?coi=1) 헤더 주입 + 1회 새로고침으로 연다(swCoiProbe 4/4).
name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: 데모 사이트 조립 (예제 + 라이브러리 + SW 루트 사본 + 랜딩)
        run: |
          mkdir -p _site
          cp -r examples src _site/
          cp index.js index.d.ts LICENSE _site/
          cp src/capabilities/pyprocSw.js _site/pyprocSw.js
          cat > _site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="ko">
          <head>
            <meta charset="utf-8">
            <title>pyproc - 브라우저 파이썬 머신 데모</title>
            <style>
              body{font:15px/1.6 ui-monospace,Consolas,monospace;margin:3rem auto;max-width:44rem;padding:0 1rem;background:#0d1117;color:#d7dde3}
              h1{color:#7ce38b} a{color:#8ab4ff} li{margin:.5rem 0} .dim{color:#8b949e}
            </style>
          </head>
          <body>
            <h1>pyproc</h1>
            <p>서버 없이 브라우저 탭에서 도는 진짜 파이썬. 아래는 라이브 데모다(Chromium/Edge 전용).</p>
            <ul>
              <li><a href="examples/machine.html">파이썬 머신</a> - 탭을 닫아도 안 죽고, .pymachine 파일로 이동하는 컴퓨터</li>
              <li><a href="examples/terminal.html">터미널</a> - 진짜 REPL, input() 블로킹, %undo 시간여행</li>
              <li><a href="examples/processOs.html">프로세스 OS</a> - fork와 멀티코어 병렬 <span class="dim">(첫 방문 시 1회 자동 새로고침)</span></li>
              <li><a href="examples/basic.html">기본</a> - 부팅과 실행</li>
            </ul>
            <p class="dim">소스/문서: <a href="https://github.com/eddmpython/pyproc">github.com/eddmpython/pyproc</a> ·
               설치: <a href="https://www.npmjs.com/package/pyproc">npm install pyproc</a></p>
          </body>
          </html>
          EOF
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
