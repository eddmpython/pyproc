<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="128" height="128" role="img" aria-label="pyproc">
  <!-- pyproc 브랜드 마크(정본). 리본이 접혀 만든 P = 프로세스, 그 품에 든 터미널 창(>_) = 탭 안에서
       진짜로 도는 셸. 접힘 그림자는 방사 감쇠(알파 1에서 0)라 층 경계에 단차가 없다.
       이 파일이 브랜드 색의 출처다: 본체 그라디언트 #247efd에서 #6c38fd, 터미널 #08112a.
       demo.css의 markFrom, markTo, ink 변수가 여기서 오고 tests/run.mjs의 [브랜드] 게이트가 일치를 검사한다.
       파비콘·헤더 로고·README가 전부 이 파일 하나를 참조한다(인라인 복제 금지).
       주의: SVG는 XML이다. 주석 안에 연속 하이픈을 쓰면 파일 전체가 파싱 불가가 되고
       브라우저는 아무 에러 없이 이미지를 통째로 버린다(게이트가 이 규칙을 검사한다). -->
